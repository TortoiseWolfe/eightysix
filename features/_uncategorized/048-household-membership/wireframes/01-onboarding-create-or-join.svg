    <!-- Fork card: Create -->
    <rect x="16" y="138" width="328" height="136" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="180" y="164" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#1f2937">Create a household</text>
    <text x="180" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Start fresh and invite your roommates</text>
    <rect x="32" y="200" width="296" height="44" rx="6" fill="#8b5cf6"/>
    <text x="180" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">Create a household</text>

    <!-- Fork card: Join -->
    <rect x="16" y="288" width="328" height="136" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="180" y="314" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#1f2937">I have an invite code</text>
    <text x="180" y="336" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Your roommate sent you a code</text>
    <rect x="32" y="350" width="296" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="180" y="378" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f2937">Enter invite code</text>

    <!-- Expanded create form -->
    <rect x="16" y="438" width="328" height="190" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="32" y="464" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f2937">Household name</text>
    <rect x="32" y="474" width="296" height="44" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="44" y="500" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">The Loft</text>
    <text x="32" y="540" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#dc2626">Name can't be empty</text>
    <rect x="32" y="554" width="296" height="44" rx="6" fill="#8b5cf6"/>
    <text x="180" y="582" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">Create</text>

    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>
    <g class="callout"><circle cx="322" cy="118" r="11" fill="#dc2626"/><text x="322" y="123" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
    <g class="callout"><circle cx="322" cy="314" r="11" fill="#dc2626"/><text x="322" y="319" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text></g>
    <g class="callout"><circle cx="322" cy="458" r="11" fill="#dc2626"/><text x="322" y="463" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text></g>
  </g>

  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <g transform="translate(20, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">The create-or-join fork</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Memberless users — new sign-ups and removed</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">members alike — land here before anything else.</text>
      <a href="#US-001" transform="translate(38, 70)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-001</text></a>
      <a href="#US-003" transform="translate(102, 70)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-003</text></a>
      <a href="#FR-001" transform="translate(166, 70)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-001</text></a>
    </g>
    <g transform="translate(480, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Create form with validation</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Submitting a non-empty name creates the household</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">and the owner membership atomically.</text>
      <a href="#US-001" transform="translate(38, 70)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-001</text></a>
      <a href="#FR-002" transform="translate(102, 70)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-002</text></a>
      <a href="#SC-005" transform="translate(166, 70)"><rect width="56" height="22" rx="11" fill="#ea580c"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">SC-005</text></a>
    </g>
    <g transform="translate(940, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Join entry point</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Hands off to the join flow: enter the 8-character</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">code, preview the household, then confirm.</text>
      <a href="#US-002" transform="translate(38, 70)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <a href="#FR-004" transform="translate(102, 70)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-004</text></a>
    </g>
    <g transform="translate(1400, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Post-create empty state</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">A fresh household is empty; the banner points the</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">new owner straight at inviting roommates.</text>
      <a href="#US-002" transform="translate(38, 70)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <a href="#SC-001" transform="translate(102, 70)"><rect width="56" height="22" rx="11" fill="#ea580c"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">SC-001</text></a>
    </g>
    <g transform="translate(20, 130)">
      <text x="0" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">WHAT SHIPS</text>
      <text x="0" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Route guard: any signed-in user with zero active memberships is redirected to this fork before any other app content.</text>
      <text x="0" y="64" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Create runs one atomic transaction — household row plus owner membership; join and invite flows continue on screens 02-03.</text>
    </g>
  </g>
  <text x="40" y="1060" fill="#374151" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">048:01 | Onboarding Fork | eightysix</text>
</svg>
