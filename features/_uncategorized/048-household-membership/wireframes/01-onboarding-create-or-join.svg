<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c7ddf5"/>
      <stop offset="100%" stop-color="#b8d4f0"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <text x="960" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#4b5563" letter-spacing="1">HOUSEHOLD ONBOARDING - CREATE OR JOIN</text>
  <text x="40" y="52" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">DESKTOP (16:9)</text>
  <text x="1500" y="52" fill="#d946ef" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">MOBILE</text>

  <g id="desktop" transform="translate(40, 60)">
    <rect width="1280" height="720" rx="8" fill="#e8d4b8" stroke="#b8a080"/>
    <use href="includes/header-desktop.svg#desktop-header" x="0" y="0"/>
    <rect x="400" y="3" width="70" height="44" rx="4" fill="#8b5cf6"/>
    <text x="435" y="31" text-anchor="middle" fill="#e8d4b8" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Home</text>

    <!-- First-run heading -->
    <text x="640" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#1f2937">Welcome to 86</text>
    <text x="640" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">A household is the shared space for your roommates — create one or join with a code.</text>

    <!-- Fork card: Create -->
    <rect x="240" y="152" width="380" height="215" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <rect x="398" y="170" width="64" height="10" fill="#8b5cf6"/>
    <rect x="406" y="180" width="48" height="32" fill="#8b5cf6"/>
    <rect x="424" y="196" width="12" height="16" fill="#dcc8a8"/>
    <text x="430" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1f2937">Create a household</text>
    <text x="430" y="264" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Start fresh and invite your roommates</text>
    <rect x="290" y="292" width="280" height="44" rx="6" fill="#8b5cf6"/>
    <text x="430" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">Create a household</text>

    <!-- Fork card: Join -->
    <rect x="660" y="152" width="380" height="215" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <rect x="790" y="172" width="120" height="36" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="850" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1f2937" letter-spacing="2">G7HK4MZP</text>
    <text x="850" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1f2937">I have an invite code</text>
    <text x="850" y="264" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Your roommate sent you a code</text>
    <rect x="710" y="292" width="280" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="850" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f2937">Enter invite code</text>

    <!-- Expanded create form -->
    <rect x="240" y="396" width="800" height="132" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="264" y="426" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f2937">Household name</text>
    <rect x="264" y="438" width="540" height="44" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="280" y="464" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">The Loft</text>
    <rect x="824" y="438" width="190" height="44" rx="6" fill="#8b5cf6"/>
    <text x="919" y="466" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">Create</text>
    <text x="264" y="508" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#dc2626">Name can't be empty</text>

    <!-- Post-create empty-state banner -->
    <rect x="240" y="552" width="800" height="56" rx="8" fill="#dcc8a8" stroke="#8b5cf6"/>
    <text x="264" y="578" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1f2937">Next: invite your roommates</text>
    <text x="264" y="598" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Your new household is empty — share an invite code so the whole place is on the same list.</text>

    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>

    <g class="callout"><circle cx="640" cy="166" r="14" fill="#dc2626"/><text x="640" y="171" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
    <g class="callout"><circle cx="1066" cy="460" r="14" fill="#dc2626"/><text x="1066" y="465" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text></g>
    <g class="callout"><circle cx="1014" cy="314" r="14" fill="#dc2626"/><text x="1014" y="319" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text></g>
    <g class="callout"><circle cx="1066" cy="580" r="14" fill="#dc2626"/><text x="1066" y="585" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text></g>
  </g>

  <g id="mobile" transform="translate(1360, 60)">
