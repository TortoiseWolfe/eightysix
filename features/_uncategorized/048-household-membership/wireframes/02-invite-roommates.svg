  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <g transform="translate(20, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Code display + meta</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">8-char code from unambiguous alphabet (no 0/O, 1/l/I).</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Defaults: 7 days lifetime, 10 uses; stored per-invite.</text>
      <a href="#US-002" transform="translate(38, 74)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <a href="#FR-003" transform="translate(102, 74)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-003</text></a>
      <a href="#SC-001" transform="translate(166, 74)"><rect width="56" height="22" rx="11" fill="#ea580c"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">SC-001</text></a>
    </g>
    <g transform="translate(480, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Copy / Share actions</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Codes are shared out-of-band: text, AirDrop, or spoken.</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Share... opens the native share sheet on mobile.</text>
      <a href="#US-002" transform="translate(38, 74)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <a href="#SC-006" transform="translate(102, 74)"><rect width="56" height="22" rx="11" fill="#ea580c"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">SC-006</text></a>
    </g>
    <g transform="translate(940, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Active invites + revoke</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Owner-only Revoke takes effect immediately; revoked</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">rows stay visible struck-through as an audit cue.</text>
      <a href="#US-003" transform="translate(38, 74)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-003</text></a>
      <a href="#FR-007" transform="translate(102, 74)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-007</text></a>
    </g>
    <g transform="translate(1400, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Post-create handoff</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Lives in household settings; the empty home screen's</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">"Add roommates" call to action lands here.</text>
      <a href="#US-001" transform="translate(38, 74)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-001</text></a>
      <a href="#SC-001" transform="translate(102, 74)"><rect width="56" height="22" rx="11" fill="#ea580c"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">SC-001</text></a>
    </g>
    <g transform="translate(20, 130)">
      <text x="0" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">WHAT SHIPS</text>
      <text x="0" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Invite panel inside household settings: generate, copy, share, and revoke 8-character invite codes with per-invite expiry and use limits.</text>
      <text x="0" y="64" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Any active member can generate and share; only owners see Revoke. Redemption is rate-limited and validated server-side (FR-004, FR-016).</text>
    </g>
  </g>
  <text x="40" y="1060" fill="#374151" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">048:02 | Invite Roommates | eightysix</text>
