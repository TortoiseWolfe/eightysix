    <text x="180" y="304" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">Copy code</text>
    <rect x="32" y="330" width="296" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="180" y="358" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f2937">Share...</text>

    <!-- Active invites -->
    <text x="32" y="408" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Active invites</text>
    <rect x="32" y="420" width="296" height="48" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="44" y="442" font-family="ui-monospace, monospace" font-size="14" font-weight="600" fill="#1f2937">KQ7M-WX3P</text>
    <text x="44" y="460" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">7d left - 8/10</text>
    <text x="262" y="450" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#dc2626">Revoke</text>
    <rect x="32" y="476" width="296" height="48" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="44" y="498" font-family="ui-monospace, monospace" font-size="14" font-weight="600" fill="#1f2937">TR8N-HF2K</text>
    <text x="44" y="516" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">2d left - 3/10</text>
    <text x="262" y="506" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#dc2626">Revoke</text>
    <rect x="32" y="532" width="296" height="48" rx="6" fill="#dcc8a8" stroke="#b8a080" stroke-dasharray="4 3"/>
    <text x="44" y="561" font-family="ui-monospace, monospace" font-size="14" fill="#4b5563" text-decoration="line-through">PW4X-MD9C</text>
    <text x="254" y="561" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4b5563">Revoked</text>

    <text x="32" y="602" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Anyone with this code can join until it</text>
    <text x="32" y="620" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">expires - revoke it if it leaks.</text>

    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>
    <g class="callout"><circle cx="330" cy="208" r="11" fill="#dc2626"/><text x="330" y="213" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
    <g class="callout"><circle cx="330" cy="352" r="11" fill="#dc2626"/><text x="330" y="357" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text></g>
