    <text x="700" y="31" text-anchor="middle" fill="#e8d4b8" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Account</text>

    <!-- Settings context breadcrumb -->
    <text x="416" y="92" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">The Loft &gt; Household settings</text>

