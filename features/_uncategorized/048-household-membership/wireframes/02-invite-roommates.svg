    <text x="572" y="499" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563" text-decoration="line-through">5d left - 1/10 uses</text>
    <text x="788" y="499" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4b5563">Revoked</text>

    <!-- Note line -->
    <text x="436" y="546" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Anyone with this code can join until it expires -</text>
    <text x="436" y="566" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">revoke it if it leaks.</text>

    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>

    <g class="callout"><circle cx="890" cy="188" r="14" fill="#dc2626"/><text x="890" y="193" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
    <g class="callout"><circle cx="890" cy="284" r="14" fill="#dc2626"/><text x="890" y="289" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text></g>
    <g class="callout"><circle cx="890" cy="438" r="14" fill="#dc2626"/><text x="890" y="443" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text></g>
