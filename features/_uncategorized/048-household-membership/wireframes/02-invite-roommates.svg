    <text x="452" y="387" font-family="ui-monospace, monospace" font-size="14" font-weight="600" fill="#1f2937">KQ7M-WX3P</text>
    <text x="572" y="387" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">7d left - 8/10 uses</text>
    <text x="796" y="387" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#dc2626">Revoke</text>
    <rect x="436" y="414" width="408" height="48" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="452" y="443" font-family="ui-monospace, monospace" font-size="14" font-weight="600" fill="#1f2937">TR8N-HF2K</text>
    <text x="572" y="443" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">2d left - 3/10 uses</text>
    <text x="796" y="443" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#dc2626">Revoke</text>
