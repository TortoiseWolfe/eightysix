    <text x="640" y="198" text-anchor="middle" font-family="ui-monospace, monospace" font-size="28" font-weight="bold" letter-spacing="6" fill="#1f2937">KQ7M-WX3P</text>
    <text x="640" y="244" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Expires in 7 days - 8 of 10 uses left</text>

