    <rect x="16" y="132" width="328" height="496" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="32" y="164" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1f2937">Invite roommates</text>

