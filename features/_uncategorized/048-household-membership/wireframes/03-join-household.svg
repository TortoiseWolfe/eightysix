<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c7ddf5"/>
      <stop offset="100%" stop-color="#b8d4f0"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <text x="960" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#4b5563" letter-spacing="1">JOIN HOUSEHOLD - CODE ENTRY AND PREVIEW</text>
  <text x="40" y="52" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">DESKTOP (16:9)</text>
  <text x="1500" y="52" fill="#d946ef" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">MOBILE</text>

  <g id="desktop" transform="translate(40, 60)">
    <rect width="1280" height="720" rx="8" fill="#e8d4b8" stroke="#b8a080"/>
    <use href="includes/header-desktop.svg#desktop-header" x="0" y="0"/>
    <rect x="400" y="3" width="70" height="44" rx="4" fill="#8b5cf6"/>
    <text x="435" y="31" text-anchor="middle" fill="#e8d4b8" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Home</text>
    <!-- Household switcher chip (post-join state) -->
    <rect x="760" y="3" width="120" height="44" rx="4" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="820" y="31" text-anchor="middle" fill="#1f2937" font-family="system-ui, sans-serif" font-size="14" font-weight="600">The Loft &#9662;</text>

    <!-- Page heading -->
    <text x="640" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#1f2937">Join a household</text>
    <text x="640" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Enter the code your roommate shared with you</text>

    <!-- Stage (a): code entry card -->
    <rect x="30" y="160" width="380" height="320" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="50" y="190" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">STEP 1</text>
    <text x="50" y="220" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f2937">Enter your invite code</text>
    <rect x="50" y="232" width="340" height="44" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="66" y="260" font-family="ui-monospace, monospace" font-size="18" font-weight="600" fill="#1f2937" letter-spacing="2">kq7m-wx3p</text>
    <text x="50" y="298" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Case doesn't matter</text>
    <rect x="50" y="318" width="340" height="44" rx="6" fill="#8b5cf6"/>
    <text x="220" y="346" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">Look up</text>

    <!-- Flow arrow a -> b -->
    <line x1="414" y1="320" x2="436" y2="320" stroke="#8b5cf6" stroke-width="3"/>
    <polygon points="446,320 434,313 434,327" fill="#8b5cf6"/>

    <!-- Stage (b): preview card -->
    <rect x="450" y="160" width="380" height="320" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="470" y="190" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">STEP 2</text>
    <polygon points="640,202 598,238 682,238" fill="#8b5cf6"/>
    <rect x="612" y="238" width="56" height="42" fill="#8b5cf6"/>
    <rect x="632" y="252" width="16" height="28" fill="#dcc8a8"/>
    <text x="640" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#1f2937">Join 'The Loft'?</text>
    <text x="640" y="338" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">3 members - created March 2026</text>
    <rect x="470" y="356" width="340" height="44" rx="6" fill="#8b5cf6"/>
    <text x="640" y="384" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">Join household</text>
    <rect x="470" y="412" width="340" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="640" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f2937">Cancel</text>

    <!-- Flow arrow b -> c -->
    <line x1="834" y1="320" x2="856" y2="320" stroke="#8b5cf6" stroke-width="3"/>
    <polygon points="866,320 854,313 854,327" fill="#8b5cf6"/>

    <!-- Stage (c): error states card -->
    <rect x="870" y="160" width="380" height="320" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="890" y="190" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">IF SOMETHING IS WRONG</text>
    <circle cx="898" cy="213" r="4" fill="#ef4444"/>
    <text x="912" y="218" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">This code has expired</text>
    <circle cx="898" cy="243" r="4" fill="#ef4444"/>
    <text x="912" y="248" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">This code was revoked</text>
    <circle cx="898" cy="273" r="4" fill="#ef4444"/>
    <text x="912" y="278" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">This code has been used up</text>
    <circle cx="898" cy="303" r="4" fill="#ef4444"/>
    <text x="912" y="308" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">Code not found - check for typos</text>
    <circle cx="898" cy="333" r="4" fill="#ef4444"/>
    <text x="912" y="338" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">This household is full (20 members)</text>
    <rect x="890" y="360" width="340" height="44" rx="6" fill="#f5f0e6" stroke="#f59e0b"/>
    <text x="906" y="388" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#f59e0b">Too many attempts - try again in an hour</text>

    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>

    <g class="callout"><circle cx="425" cy="254" r="14" fill="#dc2626"/><text x="425" y="259" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
    <g class="callout"><circle cx="848" cy="295" r="14" fill="#dc2626"/><text x="848" y="300" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text></g>
    <g class="callout"><circle cx="1262" cy="278" r="14" fill="#dc2626"/><text x="1262" y="283" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text></g>
    <g class="callout"><circle cx="845" cy="378" r="14" fill="#dc2626"/><text x="845" y="383" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text></g>
    <g class="callout"><circle cx="898" cy="25" r="14" fill="#dc2626"/><text x="898" y="30" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">5</text></g>
  </g>

  <g id="mobile" transform="translate(1360, 60)">
    <rect width="360" height="720" rx="24" fill="#e8d4b8" stroke="#b8a080"/>
    <use href="includes/header-mobile.svg#mobile-header-group" x="0" y="0"/>
    <text x="180" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#1f2937">Join a household</text>

    <!-- Code entry card -->
    <rect x="16" y="124" width="328" height="196" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="32" y="152" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f2937">Enter your invite code</text>
    <rect x="32" y="164" width="296" height="44" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="48" y="192" font-family="ui-monospace, monospace" font-size="16" font-weight="600" fill="#1f2937" letter-spacing="2">kq7m-wx3p</text>
    <text x="32" y="230" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Case doesn't matter</text>
    <rect x="32" y="248" width="296" height="44" rx="6" fill="#8b5cf6"/>
    <text x="180" y="276" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">Look up</text>

    <!-- Preview card -->
    <rect x="16" y="336" width="328" height="308" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <polygon points="180,358 146,388 214,388" fill="#8b5cf6"/>
    <rect x="158" y="388" width="44" height="34" fill="#8b5cf6"/>
    <rect x="174" y="398" width="12" height="24" fill="#dcc8a8"/>
    <text x="180" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1f2937">Join 'The Loft'?</text>
    <text x="180" y="476" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">3 members - created March 2026</text>
    <rect x="32" y="494" width="296" height="44" rx="6" fill="#8b5cf6"/>
    <text x="180" y="522" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">Join household</text>
    <rect x="32" y="550" width="296" height="44" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="180" y="578" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f2937">Cancel</text>

    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>
    <g class="callout"><circle cx="320" cy="226" r="11" fill="#dc2626"/><text x="320" y="231" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
    <g class="callout"><circle cx="318" cy="448" r="11" fill="#dc2626"/><text x="318" y="453" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text></g>
  </g>

  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <g transform="translate(20, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Code entry, forgiving input</text>
      <text x="38" y="42" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Codes are case-insensitive and whitespace-trimmed.</text>
      <text x="38" y="60" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Rate-limited after 10 failed attempts per hour.</text>
      <a href="#US-002" transform="translate(38, 70)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <a href="#FR-004" transform="translate(100, 70)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-004</text></a>
      <a href="#FR-016" transform="translate(162, 70)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-016</text></a>
    </g>
    <g transform="translate(480, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Preview before commitment</text>
      <text x="38" y="42" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Invitee sees household name and member count</text>
      <text x="38" y="60" font-family="system-ui, sans-serif" font-size="14" fill="#374151">only - nothing else leaks before they confirm.</text>
      <a href="#US-002" transform="translate(38, 70)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <a href="#FR-005" transform="translate(100, 70)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-005</text></a>
      <a href="#SC-006" transform="translate(162, 70)"><rect width="56" height="22" rx="11" fill="#ea580c"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">SC-006</text></a>
    </g>
    <g transform="translate(940, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Distinct error states</text>
      <text x="38" y="42" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Five specific messages: expired, revoked, used up,</text>
      <text x="38" y="60" font-family="system-ui, sans-serif" font-size="14" fill="#374151">not found, household full. Never a generic error.</text>
      <a href="#US-002" transform="translate(38, 70)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <a href="#FR-004" transform="translate(100, 70)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-004</text></a>
      <a href="#FR-017" transform="translate(162, 70)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-017</text></a>
      <a href="#SC-003" transform="translate(224, 70)"><rect width="56" height="22" rx="11" fill="#ea580c"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">SC-003</text></a>
    </g>
    <g transform="translate(1400, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Atomic join</text>
      <text x="38" y="42" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Concurrent redemption is safe: one success per use.</text>
      <text x="38" y="60" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Re-joining routes you in - no duplicate membership.</text>
      <a href="#US-001" transform="translate(38, 70)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-001</text></a>
      <a href="#FR-006" transform="translate(100, 70)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-006</text></a>
      <a href="#FR-012" transform="translate(162, 70)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-012</text></a>
    </g>
    <g transform="translate(20, 116)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">5</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Joined households feed the switcher</text>
      <text x="38" y="42" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Users can belong to several households; a completed</text>
      <text x="38" y="60" font-family="system-ui, sans-serif" font-size="14" fill="#374151">join appears in the header switcher immediately.</text>
      <a href="#US-004" transform="translate(38, 70)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-004</text></a>
      <a href="#FR-011" transform="translate(100, 70)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-011</text></a>
    </g>
  </g>
  <text x="40" y="1060" fill="#374151" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">048:03 | Join Household | eightysix</text>
</svg>
