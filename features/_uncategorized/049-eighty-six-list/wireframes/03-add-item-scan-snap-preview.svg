      <text x="0" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Both cards show the screen 02 AddItem surface with a disabled mode selected - a states gallery, not a separate screen.</text>
      <text x="0" y="64" font-family="system-ui, sans-serif" font-size="14" fill="#374151">The convergence strip is the structural promise: features 052 and 053 plug into the same confirm and submit path, and the offline queue (051) wraps it.</text>
