      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Duplicates highlight, never error</text>
      <a href="#US-002" transform="translate(38, 28)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <a href="#FR-007" transform="translate(102, 28)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-007</text></a>
      <a href="#SC-003" transform="translate(166, 28)"><rect width="56" height="22" rx="11" fill="#ea580c"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">SC-003</text></a>
      <text x="38" y="72" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Adding an item already 86'd points you at</text>
      <text x="38" y="90" font-family="system-ui, sans-serif" font-size="14" fill="#374151">the live row. Concurrent adds converge to one.</text>
    </g>
    <g transform="translate(1400, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Optimistic submit</text>
      <a href="#US-001" transform="translate(38, 28)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-001</text></a>
      <a href="#FR-006" transform="translate(102, 28)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-006</text></a>
      <a href="#SC-001" transform="translate(166, 28)"><rect width="56" height="22" rx="11" fill="#ea580c"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">SC-001</text></a>
      <text x="38" y="72" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Tap 86 it and the item is on your list</text>
