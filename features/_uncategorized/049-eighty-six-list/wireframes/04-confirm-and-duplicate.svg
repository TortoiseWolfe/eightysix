      <a href="#FR-008" transform="translate(102, 28)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-008</text></a>
      <text x="38" y="72" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Rows keep attribution and 44px restock targets.</text>
