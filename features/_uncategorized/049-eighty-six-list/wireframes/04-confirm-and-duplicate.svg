      <a href="#FR-011" transform="translate(102, 28)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-011</text></a>
      <text x="38" y="72" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Free-text category in v1; chips surface the</text>
      <text x="38" y="90" font-family="system-ui, sans-serif" font-size="14" fill="#374151">household's history. Taxonomy may come in 052.</text>
    </g>
