      <a href="#US-002" transform="translate(38, 28)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <a href="#FR-005" transform="translate(102, 28)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-005</text></a>
      <text x="38" y="72" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Name and optional category stay editable;</text>
      <text x="38" y="90" font-family="system-ui, sans-serif" font-size="14" fill="#374151">nothing auto-submits from any capture mode.</text>
    </g>
    <g transform="translate(480, 16)">
