      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Non-product code rejection</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">QR and URL codes bounce with a specific</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">message while scanning continues.</text>
      <g transform="translate(38, 76)">
