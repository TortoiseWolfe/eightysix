      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Continuous detection, no shutter</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Viewfinder reads the barcode the moment it</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">lands in frame - point and it reads.</text>
      <g transform="translate(38, 76)">
