      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Digit-entry escape hatch always visible</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Permission or focus problems never dead-end -</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">typed digits run the same lookup chain.</text>
      <g transform="translate(38, 76)">
        <a href="#US-003"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-003</text></a>
        <a href="#FR-007" transform="translate(64, 0)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-007</text></a>
