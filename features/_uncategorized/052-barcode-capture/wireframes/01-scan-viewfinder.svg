      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Same sheet, third tab unchanged</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">The 049 surface promise holds - every tab</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">converges on the identical submit path.</text>
      <g transform="translate(38, 76)">
