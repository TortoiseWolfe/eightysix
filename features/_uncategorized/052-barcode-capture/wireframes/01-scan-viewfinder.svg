        <a href="#FR-012" transform="translate(64, 0)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-012</text></a>
      </g>
    </g>
    <g transform="translate(20, 130)">
      <text x="0" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">WHAT SHIPS</text>
      <text x="0" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Scan tab goes live inside the 049 capture sheet: continuous detection via @zxing/browser, lookup chain cache-first then Open Food Facts.</text>
      <text x="0" y="64" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Every result lands on the standard confirm step - a scan never adds anything by itself. Snap tab ships in 053.</text>
    </g>
