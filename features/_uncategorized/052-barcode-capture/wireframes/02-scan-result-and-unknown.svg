<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c7ddf5"/>
      <stop offset="100%" stop-color="#b8d4f0"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <text x="960" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#4b5563" letter-spacing="1">SCAN RESULTS - KNOWN AND UNKNOWN BARCODES</text>
  <text x="40" y="52" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">DESKTOP (16:9)</text>
  <text x="1500" y="52" fill="#d946ef" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">MOBILE</text>

  <g id="desktop" transform="translate(40, 60)">
    <rect width="1280" height="720" rx="8" fill="#e8d4b8" stroke="#b8a080"/>
    <use href="includes/header-desktop.svg#desktop-header" x="0" y="0"/>
    <rect x="400" y="3" width="70" height="44" rx="4" fill="#8b5cf6"/>
    <text x="435" y="31" text-anchor="middle" fill="#e8d4b8" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Home</text>

    <text x="640" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#1f2937">Scan Results</text>

    <!-- LEFT CARD: Known product - confirm step prefilled -->
    <rect x="30" y="110" width="600" height="500" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="54" y="145" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1f2937">Known product</text>
    <text x="54" y="170" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Cache hit - the confirm step arrives prefilled</text>

    <rect x="54" y="190" width="72" height="72" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="90" y="231" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">IMG</text>
    <rect x="142" y="208" width="190" height="36" rx="18" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="237" y="231" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#374151">0 78927 36251 8</text>

    <text x="54" y="296" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f2937">Name</text>
    <rect x="54" y="306" width="552" height="44" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="70" y="333" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">Sriracha Hot Chili Sauce</text>

    <text x="54" y="380" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f2937">Category</text>
    <rect x="54" y="390" width="552" height="44" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="70" y="417" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">Condiments</text>

    <rect x="54" y="458" width="552" height="48" rx="6" fill="#8b5cf6"/>
    <text x="330" y="488" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#e8d4b8">86 it</text>

    <text x="54" y="544" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Prefilled from the shared product cache - edit anything</text>

    <!-- RIGHT CARD: New to everyone - manual naming with barcode preserved -->
    <rect x="650" y="110" width="600" height="500" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="674" y="145" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1f2937">New to everyone</text>
    <text x="674" y="170" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">No cache or database match - name it once</text>

    <rect x="674" y="190" width="552" height="54" rx="6" fill="#dcc8a8" stroke="#2563eb" stroke-width="2"/>
    <text x="694" y="222" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937"><tspan font-weight="700" fill="#2563eb">New one!</tspan> Name it and you have named it for everyone</text>

    <text x="674" y="296" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f2937">Name</text>
    <rect x="674" y="306" width="552" height="44" rx="4" fill="#f5f0e6" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="690" y="316" width="2" height="24" fill="#1f2937"/>

    <text x="674" y="380" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f2937">Barcode</text>
    <rect x="674" y="390" width="190" height="36" rx="18" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="769" y="413" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#374151">0 78927 36251 8</text>

    <text x="674" y="448" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Your name for this barcode prefills for every household that scans it later</text>

    <rect x="674" y="458" width="552" height="48" rx="6" fill="#8b5cf6"/>
    <text x="950" y="488" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#e8d4b8">86 it</text>

    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>

    <g class="callout"><circle cx="622" cy="328" r="14" fill="#dc2626"/><text x="622" y="333" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
    <g class="callout"><circle cx="1238" cy="217" r="14" fill="#dc2626"/><text x="1238" y="222" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text></g>
    <g class="callout"><circle cx="890" cy="408" r="14" fill="#dc2626"/><text x="890" y="413" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text></g>
    <g class="callout"><circle cx="620" cy="540" r="14" fill="#dc2626"/><text x="620" y="545" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text></g>
  </g>

  <g id="mobile" transform="translate(1360, 60)">
    <rect width="360" height="720" rx="24" fill="#e8d4b8" stroke="#b8a080"/>
    <use href="includes/header-mobile.svg#mobile-header-group" x="0" y="0"/>
    <text x="180" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#1f2937">Known product - confirm</text>

    <rect x="16" y="142" width="328" height="476" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <rect x="32" y="160" width="56" height="56" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="60" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">IMG</text>
    <rect x="100" y="170" width="160" height="36" rx="18" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="180" y="193" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#374151">0 78927 36251 8</text>

    <text x="32" y="252" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f2937">Name</text>
    <rect x="32" y="262" width="296" height="44" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="46" y="289" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">Sriracha Hot Chili Sauce</text>

    <text x="32" y="336" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f2937">Category</text>
    <rect x="32" y="346" width="296" height="44" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="46" y="373" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">Condiments</text>

    <rect x="32" y="414" width="296" height="48" rx="6" fill="#8b5cf6"/>
    <text x="180" y="444" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#e8d4b8">86 it</text>

    <text x="32" y="492" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Prefilled from the shared product</text>
    <text x="32" y="512" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">cache - edit anything</text>

    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>

    <g class="callout"><circle cx="332" cy="284" r="11" fill="#dc2626"/><text x="332" y="289" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
    <g class="callout"><circle cx="288" cy="188" r="11" fill="#dc2626"/><text x="288" y="193" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text></g>
    <g class="callout"><circle cx="300" cy="502" r="11" fill="#dc2626"/><text x="300" y="507" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text></g>
  </g>

  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <g transform="translate(20, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Prefilled confirm, edits win</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Cache hit lands on the standard confirm step; the</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">member's edit wins. A scan never adds by itself.</text>
      <a href="#US-001" transform="translate(38, 76)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-001</text></a>
      <a href="#FR-003" transform="translate(100, 76)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-003</text></a>
      <a href="#FR-004" transform="translate(162, 76)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-004</text></a>
      <a href="#SC-001" transform="translate(224, 76)"><rect width="56" height="22" rx="11" fill="#ea580c"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">SC-001</text></a>
    </g>
    <g transform="translate(480, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Unknown barcode names the network</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Empty lookup routes to manual naming with a notice;</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">one member's typing becomes everyone's prefill.</text>
      <a href="#US-002" transform="translate(38, 76)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <a href="#FR-005" transform="translate(100, 76)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-005</text></a>
      <a href="#SC-003" transform="translate(162, 76)"><rect width="56" height="22" rx="11" fill="#ea580c"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">SC-003</text></a>
    </g>
    <g transform="translate(940, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Barcode chip survives every path</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">The draft carries the scanned digits silently through</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">prefill, manual entry, and member edits.</text>
      <a href="#US-002" transform="translate(38, 76)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <a href="#FR-005" transform="translate(100, 76)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-005</text></a>
    </g>
    <g transform="translate(1400, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Background freshness</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Cache rows older than 30 days refresh after prefill;</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">freshness never blocks capture.</text>
      <a href="#US-002" transform="translate(38, 76)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <a href="#US-003" transform="translate(100, 76)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-003</text></a>
      <a href="#FR-006" transform="translate(162, 76)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-006</text></a>
    </g>
    <g transform="translate(20, 130)">
      <text x="0" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">WHAT SHIPS</text>
      <text x="0" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Lookup chain: shared product cache first, then Open Food Facts on miss, caching results. Both outcomes converge on the 049 confirm step.</text>
      <text x="0" y="64" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Cache rows hold public data only (barcode, name, brand, category, source, fetched-at) - no household or member references.</text>
    </g>
  </g>
  <text x="40" y="1060" fill="#374151" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">052:02 | Scan Results | eightysix</text>
</svg>
