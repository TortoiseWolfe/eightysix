    <text x="275" y="338" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1f2937">3</text>
    <rect x="296" y="310" width="34" height="44" rx="4" fill="#f5f0e6" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="313" y1="320" x2="313" y2="344" stroke="#8b5cf6" stroke-width="2"/>
    <text x="180" y="402" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6" text-decoration="underline">Enable camera in settings</text>
    <text x="180" y="432" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Digits run the same lookup</text>
    <rect x="32" y="456" width="296" height="44" rx="6" fill="#8b5cf6"/>
    <text x="180" y="484" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">Look it up</text>
    <text x="180" y="540" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Offline? Name it now - lookup waits</text>

    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>
    <g class="callout"><circle cx="320" cy="376" r="11" fill="#dc2626"/><text x="320" y="381" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
  </g>

  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <g transform="translate(20, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Digit entry fallback</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Permission denial degrades to typing the digits -</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">the exact same lookup chain runs.</text>
      <a href="#US-003" transform="translate(38, 76)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-003</text></a>
      <a href="#US-001" transform="translate(102, 76)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-001</text></a>
      <a href="#FR-007" transform="translate(166, 76)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-007</text></a>
      <a href="#SC-004" transform="translate(230, 76)"><rect width="56" height="22" rx="11" fill="#ea580c"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">SC-004</text></a>
    </g>
    <g transform="translate(480, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Offline capture completes NOW</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Lookup defers to reconnection; capture never</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">waits. Queue-ready for feature 051.</text>
      <a href="#US-003" transform="translate(38, 76)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-003</text></a>
      <a href="#US-002" transform="translate(102, 76)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <a href="#FR-008" transform="translate(166, 76)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-008</text></a>
    </g>
    <g transform="translate(940, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Skippable slow lookups</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">3 seconds is the patience budget; skipping to</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">manual entry never loses the barcode.</text>
      <a href="#US-003" transform="translate(38, 76)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-003</text></a>
      <a href="#FR-009" transform="translate(102, 76)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-009</text></a>
    </g>
    <g transform="translate(1400, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Decode timeout escape</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">10s of failed decoding offers digit entry and</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">the Type tab - zero dead ends.</text>
      <a href="#US-003" transform="translate(38, 76)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-003</text></a>
      <a href="#FR-001" transform="translate(102, 76)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-001</text></a>
      <a href="#SC-002" transform="translate(166, 76)"><rect width="56" height="22" rx="11" fill="#ea580c"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">SC-002</text></a>
    </g>
    <g transform="translate(20, 130)">
      <text x="0" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">WHAT SHIPS</text>
      <text x="0" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Every fallback lands on a working capture path and converges on the 049 confirm step with the barcode preserved on the draft.</text>
      <text x="0" y="64" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Stepwise degradation: live viewfinder, then digit entry, then plain manual naming - the Scan tab never dead-ends.</text>
    </g>
  </g>
  <text x="40" y="1060" fill="#374151" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">052:03 | Scan Fallbacks | eightysix</text>
</svg>
