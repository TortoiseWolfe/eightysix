    <text x="435" y="31" text-anchor="middle" fill="#e8d4b8" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Home</text>

    <text x="40" y="84" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#1f2937">Scan - when things get in the way</text>

    <!-- Card 1: Camera permission denied -->
    <rect x="40" y="94" width="1200" height="152" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <!-- Lock glyph -->
    <path d="M 88 138 L 88 128 A 14 14 0 0 1 116 128 L 116 138" fill="none" stroke="#4b5563" stroke-width="4"/>
    <rect x="80" y="138" width="44" height="34" rx="4" fill="#4b5563"/>
    <circle cx="102" cy="153" r="5" fill="#f5f0e6"/>
    <text x="160" y="128" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1f2937">Camera permission denied</text>
    <text x="160" y="152" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Camera is off for 86</text>
    <!-- Digit entry row: 8 boxes, 7 filled -->
    <rect x="160" y="172" width="44" height="44" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="182" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1f2937">0</text>
    <rect x="214" y="172" width="44" height="44" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="236" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1f2937">7</text>
    <rect x="268" y="172" width="44" height="44" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="290" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1f2937">8</text>
    <rect x="322" y="172" width="44" height="44" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="344" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1f2937">9</text>
    <rect x="376" y="172" width="44" height="44" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="398" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1f2937">2</text>
