    <rect x="106" y="310" width="34" height="44" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="123" y="338" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1f2937">8</text>
    <rect x="144" y="310" width="34" height="44" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="161" y="338" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1f2937">9</text>
    <rect x="182" y="310" width="34" height="44" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="199" y="338" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1f2937">2</text>
    <rect x="220" y="310" width="34" height="44" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="237" y="338" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1f2937">7</text>
