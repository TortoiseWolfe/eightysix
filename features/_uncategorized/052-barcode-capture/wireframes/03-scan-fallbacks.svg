    <text x="452" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1f2937">7</text>
    <rect x="484" y="172" width="44" height="44" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="506" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1f2937">3</text>
    <rect x="538" y="172" width="44" height="44" rx="4" fill="#f5f0e6" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="560" y1="182" x2="560" y2="206" stroke="#8b5cf6" stroke-width="2"/>
    <text x="760" y="152" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6" text-decoration="underline">Enable camera in settings</text>
    <text x="760" y="200" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Digits run the same lookup</text>

    <!-- Card 2: Offline at the fridge -->
    <rect x="40" y="256" width="1200" height="152" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <!-- Cloud-off glyph -->
    <circle cx="88" cy="318" r="14" fill="#4b5563"/>
    <circle cx="106" cy="310" r="17" fill="#4b5563"/>
    <circle cx="123" cy="320" r="12" fill="#4b5563"/>
    <rect x="76" y="318" width="60" height="14" rx="7" fill="#4b5563"/>
    <line x1="70" y1="344" x2="140" y2="290" stroke="#dcc8a8" stroke-width="9"/>
    <line x1="70" y1="344" x2="140" y2="290" stroke="#4b5563" stroke-width="4"/>
    <text x="160" y="290" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1f2937">Offline at the fridge</text>
    <text x="160" y="314" font-family="system-ui, sans-serif" font-size="14" fill="#374151">No connection - name it now, we will look it up later</text>
    <rect x="160" y="330" width="420" height="44" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="176" y="357" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Name the item</text>
    <!-- Barcode chip -->
    <rect x="600" y="330" width="190" height="44" rx="22" fill="#f5f0e6" stroke="#b8a080"/>
    <line x1="620" y1="342" x2="620" y2="362" stroke="#1f2937" stroke-width="2"/>
    <line x1="625" y1="342" x2="625" y2="362" stroke="#1f2937" stroke-width="1"/>
    <line x1="630" y1="342" x2="630" y2="362" stroke="#1f2937" stroke-width="3"/>
    <line x1="636" y1="342" x2="636" y2="362" stroke="#1f2937" stroke-width="1"/>
    <text x="648" y="357" font-family="system-ui, sans-serif" font-size="14" fill="#374151">0789273158426</text>
    <rect x="810" y="330" width="120" height="44" rx="6" fill="#8b5cf6"/>
    <text x="870" y="358" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">86 it</text>
    <text x="160" y="398" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Lookup retries when the connection returns</text>

    <!-- Card 3: Slow lookup -->
    <rect x="40" y="418" width="1200" height="148" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <!-- Spinner -->
    <circle cx="102" cy="480" r="20" fill="none" stroke="#b8a080" stroke-width="4"/>
    <circle cx="102" cy="480" r="20" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-dasharray="40 86" stroke-linecap="round"/>
    <text x="102" y="525" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4b5563">3s</text>
    <text x="160" y="452" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1f2937">Slow lookup</text>
    <text x="160" y="478" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Checking the product database...</text>
    <rect x="160" y="496" width="260" height="44" rx="6" fill="#f5f0e6" stroke="#8b5cf6" stroke-width="2"/>
    <text x="290" y="524" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b5cf6">Skip - type it myself</text>
    <text x="520" y="524" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">The barcode stays on the draft either way</text>

    <!-- Decode timeout strip -->
    <rect x="40" y="576" width="1200" height="56" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="60" y="610" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Decode timeout</text>
    <text x="200" y="610" font-family="system-ui, sans-serif" font-size="14" fill="#374151">After 10 seconds of failed decoding the viewfinder offers digit entry and the Type tab - zero dead ends</text>

    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>

    <g class="callout"><circle cx="620" cy="194" r="14" fill="#dc2626"/><text x="620" y="199" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
    <g class="callout"><circle cx="965" cy="352" r="14" fill="#dc2626"/><text x="965" y="357" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text></g>
    <g class="callout"><circle cx="460" cy="518" r="14" fill="#dc2626"/><text x="460" y="523" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text></g>
    <g class="callout"><circle cx="1180" cy="586" r="14" fill="#dc2626"/><text x="1180" y="591" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text></g>
  </g>

  <g id="mobile" transform="translate(1360, 60)">
    <rect width="360" height="720" rx="24" fill="#e8d4b8" stroke="#b8a080"/>
