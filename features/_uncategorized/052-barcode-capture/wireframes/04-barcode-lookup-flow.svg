<?xml version="1.0" encoding="UTF-8"?>
<!-- Barcode Lookup Flow - backend architecture page - Dark Theme -->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Light theme gradient (validator compliance) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c7ddf5"/>
      <stop offset="100%" stop-color="#b8d4f0"/>
    </linearGradient>
    <!-- Dark theme gradient -->
    <linearGradient id="bg-dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <!-- Arrow markers -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg-dark)"/>

  <!-- Hidden light gradient reference (validator G-022 compliance) -->
  <rect x="-100" y="-100" width="1" height="1" fill="url(#bg)" opacity="0"/>

  <!-- CENTERED TITLE -->
  <text x="960" y="28" text-anchor="middle" font-family="system-ui, sans-serif"
        font-size="18" font-weight="700" fill="#94a3b8" letter-spacing="1">
    BARCODE LOOKUP - CACHE AND PUBLIC DATABASE CHAIN
  </text>

  <!-- Section labels (validator compliance) -->
  <text x="680" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">DESKTOP (16:9)</text>
  <text x="1360" y="52" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">MOBILE (9:16)</text>

  <!-- Hidden includes (validator HDR-001 compliance) -->
  <g id="desktop" opacity="0" transform="translate(-9999, -9999)">
    <use href="includes/header-desktop.svg#desktop-header" x="0" y="0"/>
    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>
  </g>
  <g id="mobile" opacity="0" transform="translate(-9999, -9999)">
    <use href="includes/header-mobile.svg#mobile-header-group" x="0" y="0"/>
    <rect x="10" y="80" width="340" height="580" fill="none"/>
    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>
  </g>

  <!-- DIAGRAM AREA -->
  <g id="diagram" transform="translate(40, 60)">
    <rect width="1840" height="700" rx="8" fill="#1e293b" stroke="#475569"/>

    <!-- SECTION HEADERS -->
    <text x="180" y="40" text-anchor="middle" fill="#94a3b8" font-size="16" font-weight="bold">CAPTURE</text>
    <text x="560" y="40" text-anchor="middle" fill="#94a3b8" font-size="16" font-weight="bold">LOOKUP CHAIN</text>
    <text x="1000" y="40" text-anchor="middle" fill="#94a3b8" font-size="16" font-weight="bold">FALLBACK</text>
    <text x="1390" y="40" text-anchor="middle" fill="#94a3b8" font-size="16" font-weight="bold">CONFIRM</text>
    <text x="1715" y="40" text-anchor="middle" fill="#94a3b8" font-size="16" font-weight="bold">SUBMIT</text>

    <!-- (a) Scan tab - zxing decode -->
    <g transform="translate(40, 120)">
      <rect width="240" height="130" rx="8" fill="#334155" stroke="#8b5cf6" stroke-width="2"/>
      <text x="120" y="35" text-anchor="middle" fill="#c4b5fd" font-size="16" font-weight="bold">SCAN TAB</text>
      <text x="120" y="62" text-anchor="middle" fill="#94a3b8" font-size="14">zxing decode</text>
      <text x="120" y="84" text-anchor="middle" fill="#64748b" font-size="14">continuous detection</text>
      <text x="120" y="106" text-anchor="middle" fill="#64748b" font-size="14">camera or typed digits</text>
    </g>

    <!-- (b) product_cache lookup -->
    <g transform="translate(380, 90)">
      <rect width="320" height="180" rx="8" fill="#334155" stroke="#22c55e" stroke-width="2"/>
      <text x="160" y="32" text-anchor="middle" fill="#22c55e" font-size="16" font-weight="bold">product_cache LOOKUP</text>
      <text x="160" y="62" text-anchor="middle" fill="#94a3b8" font-size="14">shared PUBLIC data</text>
      <text x="160" y="86" text-anchor="middle" fill="#94a3b8" font-size="14">barcode UNIQUE, name, brand,</text>
      <text x="160" y="108" text-anchor="middle" fill="#94a3b8" font-size="14">category, fetched_at</text>
      <text x="160" y="138" text-anchor="middle" fill="#f87171" font-size="14">NO household or</text>
      <text x="160" y="158" text-anchor="middle" fill="#f87171" font-size="14">member columns</text>
    </g>
    <!-- Callout 1: two-step lookup chain -->
    <circle cx="722" cy="92" r="14" fill="#dc2626"/>
    <text x="722" y="97" text-anchor="middle" fill="#e8d4b8" font-size="14" font-weight="bold">1</text>

    <!-- (c) Open Food Facts API -->
    <g transform="translate(380, 390)">
      <rect width="320" height="130" rx="8" fill="#334155" stroke="#f59e0b" stroke-width="2"/>
      <text x="160" y="35" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="bold">OPEN FOOD FACTS API</text>
      <text x="160" y="65" text-anchor="middle" fill="#94a3b8" font-size="14">public API, no key</text>
      <text x="160" y="90" text-anchor="middle" fill="#94a3b8" font-size="14">trimmed response only</text>
      <text x="160" y="112" text-anchor="middle" fill="#64748b" font-size="14">skippable after 3s (FR-009)</text>
    </g>

    <!-- (d) Manual naming - barcode preserved -->
    <g transform="translate(810, 390)">
      <rect width="360" height="170" rx="8" fill="#334155" stroke="#ef4444" stroke-width="2"/>
      <text x="180" y="32" text-anchor="middle" fill="#f87171" font-size="16" font-weight="bold">MANUAL NAMING</text>
      <text x="180" y="56" text-anchor="middle" fill="#94a3b8" font-size="14">barcode preserved on the draft</text>
      <text x="180" y="84" text-anchor="middle" fill="#94a3b8" font-size="14">submission upserts cache:</text>
      <text x="180" y="106" text-anchor="middle" fill="#94a3b8" font-size="14">one member names it for the whole network</text>
      <text x="180" y="134" text-anchor="middle" fill="#64748b" font-size="14">latest-write wins,</text>
      <text x="180" y="154" text-anchor="middle" fill="#64748b" font-size="14">rate-limited (FR-010)</text>
    </g>
    <!-- Callout 4: abuse bounded -->
    <circle cx="1192" cy="392" r="14" fill="#dc2626"/>
    <text x="1192" y="397" text-anchor="middle" fill="#e8d4b8" font-size="14" font-weight="bold">4</text>

    <!-- (e) 049 confirm step (tall gate) -->
    <g transform="translate(1290, 90)">
      <rect width="220" height="440" rx="8" fill="#334155" stroke="#38bdf8" stroke-width="2"/>
      <text x="110" y="36" text-anchor="middle" fill="#38bdf8" font-size="16" font-weight="bold">049 CONFIRM STEP</text>
      <text x="110" y="66" text-anchor="middle" fill="#94a3b8" font-size="14">the only gate</text>
      <text x="110" y="110" text-anchor="middle" fill="#e8d4b8" font-size="14" font-weight="bold">EDITS WIN</text>
      <text x="110" y="134" text-anchor="middle" fill="#94a3b8" font-size="14">prefill is a suggestion</text>
      <text x="110" y="178" text-anchor="middle" fill="#e8d4b8" font-size="14" font-weight="bold">NOTHING AUTO-ADDS</text>
      <text x="110" y="202" text-anchor="middle" fill="#94a3b8" font-size="14">(FR-004)</text>
      <text x="110" y="246" text-anchor="middle" fill="#94a3b8" font-size="14">name, category,</text>
      <text x="110" y="268" text-anchor="middle" fill="#94a3b8" font-size="14">barcode attached</text>
      <text x="110" y="312" text-anchor="middle" fill="#64748b" font-size="14">cancel = nothing added,</text>
      <text x="110" y="334" text-anchor="middle" fill="#64748b" font-size="14">nothing cached against</text>
      <text x="110" y="356" text-anchor="middle" fill="#64748b" font-size="14">the household</text>
      <text x="110" y="400" text-anchor="middle" fill="#94a3b8" font-size="14">every path converges</text>
      <text x="110" y="422" text-anchor="middle" fill="#94a3b8" font-size="14">here before submit</text>
    </g>
    <!-- Callout 3: confirm step is the only gate -->
    <circle cx="1532" cy="92" r="14" fill="#dc2626"/>
    <text x="1532" y="97" text-anchor="middle" fill="#e8d4b8" font-size="14" font-weight="bold">3</text>

    <!-- (f) Single submit path -->
    <g transform="translate(1600, 200)">
      <rect width="210" height="200" rx="8" fill="#334155" stroke="#22c55e" stroke-width="2"/>
      <text x="105" y="36" text-anchor="middle" fill="#22c55e" font-size="16" font-weight="bold">SINGLE SUBMIT</text>
      <text x="105" y="58" text-anchor="middle" fill="#22c55e" font-size="16" font-weight="bold">PATH</text>
      <text x="105" y="92" text-anchor="middle" fill="#94a3b8" font-size="14">capture_method</text>
      <text x="105" y="114" text-anchor="middle" fill="#94a3b8" font-size="14">= barcode</text>
      <text x="105" y="148" text-anchor="middle" fill="#64748b" font-size="14">consent gate from 049</text>
      <text x="105" y="170" text-anchor="middle" fill="#64748b" font-size="14">applies unchanged</text>
    </g>

    <!-- LEGEND -->
    <g transform="translate(810, 90)">
      <rect width="360" height="180" rx="4" fill="#0f172a" stroke="#475569"/>
      <text x="180" y="28" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="bold">LOOKUP OUTCOMES</text>
      <line x1="25" y1="58" x2="95" y2="58" stroke="#22c55e" stroke-width="3" marker-end="url(#arrow-green)"/>
      <text x="110" y="63" fill="#22c55e" font-size="14">hit / found - prefill confirm</text>
      <line x1="25" y1="93" x2="95" y2="93" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrow-amber)"/>
      <text x="110" y="98" fill="#f59e0b" font-size="14">miss - next link in the chain</text>
      <line x1="25" y1="128" x2="95" y2="128" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)"/>
      <text x="110" y="133" fill="#ef4444" font-size="14">not found - manual naming</text>
      <line x1="25" y1="163" x2="95" y2="163" stroke="#8b5cf6" stroke-width="3" marker-end="url(#arrow)"/>
      <text x="110" y="168" fill="#8b5cf6" font-size="14">draft moves forward</text>
    </g>

    <!-- FLOW ARROWS -->

    <!-- (a) scan -> (b) cache lookup -->
    <line x1="280" y1="185" x2="370" y2="182" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="325" y="168" text-anchor="middle" fill="#8b5cf6" font-size="14">barcode</text>

    <!-- (b) hit -> (e) prefill confirm (green) -->
    <line x1="700" y1="120" x2="1280" y2="128" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
    <text x="990" y="112" text-anchor="middle" fill="#22c55e" font-size="14">HIT - prefill confirm</text>

    <!-- (b) miss -> (c) Open Food Facts (amber, down) -->
    <line x1="540" y1="270" x2="540" y2="380" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)"/>
    <text x="588" y="330" text-anchor="middle" fill="#f59e0b" font-size="14">MISS</text>

    <!-- (c) found -> upsert cache, joining toward (e) (green, up-right) -->
    <line x1="700" y1="420" x2="1280" y2="300" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
    <text x="990" y="338" text-anchor="middle" fill="#22c55e" font-size="14">FOUND - upsert cache + prefill</text>

    <!-- (c) not found -> (d) manual naming (red) -->
    <line x1="700" y1="475" x2="800" y2="475" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
    <text x="750" y="460" text-anchor="middle" fill="#ef4444" font-size="14">NOT FOUND</text>

    <!-- (d) named draft -> (e) confirm (purple) -->
    <line x1="1170" y1="470" x2="1280" y2="466" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="1225" y="452" text-anchor="middle" fill="#8b5cf6" font-size="14">named draft</text>

    <!-- (e) confirm -> (f) submit (green) -->
    <line x1="1510" y1="300" x2="1590" y2="300" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
    <text x="1550" y="284" text-anchor="middle" fill="#22c55e" font-size="14">86 it</text>

    <!-- BOTTOM STRIP: stale cache freshness -->
    <g transform="translate(40, 590)">
      <rect width="1770" height="72" rx="8" fill="#0f172a" stroke="#475569" stroke-dasharray="8,4"/>
      <text x="40" y="30" fill="#fbbf24" font-size="14" font-weight="bold">STALE CACHE (OLDER THAN 30 DAYS)</text>
      <text x="40" y="54" fill="#94a3b8" font-size="14">serve the cached value immediately + background refresh updates the row - never blocking the member (FR-006)</text>
    </g>
    <!-- Callout 2: the cache is a commons (public columns + freshness strip below) -->
    <circle cx="722" cy="248" r="14" fill="#dc2626"/>
    <text x="722" y="253" text-anchor="middle" fill="#e8d4b8" font-size="14" font-weight="bold">2</text>
  </g>

  <!-- ANNOTATIONS -->
  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#1e293b" stroke="#475569"/>

    <!-- Group 1: Two-Step Lookup Chain -->
    <g transform="translate(20, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#e8d4b8" font-size="14" font-weight="bold">1</text>
      <text x="40" y="19" fill="#e8d4b8" font-size="14" font-weight="bold">Two-Step Lookup Chain</text>
      <text x="40" y="40" fill="#94a3b8" font-size="14">Cache first, public database on miss.</text>
      <text x="40" y="58" fill="#94a3b8" font-size="14">Known products prefill in under 8 seconds.</text>
      <a href="#US-001"><rect x="40" y="70" width="55" height="20" rx="4" fill="#0891b2"/><text x="67" y="84" text-anchor="middle" fill="#e8d4b8" font-size="14">US-001</text></a>
      <a href="#FR-002"><rect x="100" y="70" width="55" height="20" rx="4" fill="#2563eb"/><text x="127" y="84" text-anchor="middle" fill="#e8d4b8" font-size="14">FR-002</text></a>
      <a href="#SC-001"><rect x="160" y="70" width="55" height="20" rx="4" fill="#ea580c"/><text x="187" y="84" text-anchor="middle" fill="#e8d4b8" font-size="14">SC-001</text></a>
    </g>

    <!-- Group 2: The Cache Is a Commons -->
    <g transform="translate(480, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#e8d4b8" font-size="14" font-weight="bold">2</text>
      <text x="40" y="19" fill="#e8d4b8" font-size="14" font-weight="bold">The Cache Is a Commons</text>
      <text x="40" y="40" fill="#94a3b8" font-size="14">Public data only, community-named, freshness-managed.</text>
      <text x="40" y="58" fill="#94a3b8" font-size="14">One household names it; every household benefits.</text>
      <a href="#US-002"><rect x="40" y="70" width="55" height="20" rx="4" fill="#0891b2"/><text x="67" y="84" text-anchor="middle" fill="#e8d4b8" font-size="14">US-002</text></a>
      <a href="#FR-005"><rect x="100" y="70" width="55" height="20" rx="4" fill="#2563eb"/><text x="127" y="84" text-anchor="middle" fill="#e8d4b8" font-size="14">FR-005</text></a>
      <a href="#FR-006"><rect x="160" y="70" width="55" height="20" rx="4" fill="#2563eb"/><text x="187" y="84" text-anchor="middle" fill="#e8d4b8" font-size="14">FR-006</text></a>
      <a href="#SC-003"><rect x="220" y="70" width="55" height="20" rx="4" fill="#ea580c"/><text x="247" y="84" text-anchor="middle" fill="#e8d4b8" font-size="14">SC-003</text></a>
    </g>

    <!-- Group 3: Confirm Step Is the Only Gate -->
    <g transform="translate(940, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#e8d4b8" font-size="14" font-weight="bold">3</text>
      <text x="40" y="19" fill="#e8d4b8" font-size="14" font-weight="bold">Confirm Step Is the Only Gate</text>
      <text x="40" y="40" fill="#94a3b8" font-size="14">Prefill is a suggestion everywhere; edits win.</text>
      <text x="40" y="58" fill="#94a3b8" font-size="14">A scan never adds an item by itself.</text>
      <a href="#US-001"><rect x="40" y="70" width="55" height="20" rx="4" fill="#0891b2"/><text x="67" y="84" text-anchor="middle" fill="#e8d4b8" font-size="14">US-001</text></a>
      <a href="#FR-003"><rect x="100" y="70" width="55" height="20" rx="4" fill="#2563eb"/><text x="127" y="84" text-anchor="middle" fill="#e8d4b8" font-size="14">FR-003</text></a>
      <a href="#FR-004"><rect x="160" y="70" width="55" height="20" rx="4" fill="#2563eb"/><text x="187" y="84" text-anchor="middle" fill="#e8d4b8" font-size="14">FR-004</text></a>
    </g>

    <!-- Group 4: Abuse Bounded -->
    <g transform="translate(1400, 20)">
      <circle cx="14" cy="14" r="14" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#e8d4b8" font-size="14" font-weight="bold">4</text>
      <text x="40" y="19" fill="#e8d4b8" font-size="14" font-weight="bold">Abuse Bounded</text>
      <text x="40" y="40" fill="#94a3b8" font-size="14">Authenticated + rate-limited writes protect</text>
      <text x="40" y="58" fill="#94a3b8" font-size="14">the commons; latest-write wins on corrections.</text>
      <a href="#US-003"><rect x="40" y="70" width="55" height="20" rx="4" fill="#0891b2"/><text x="67" y="84" text-anchor="middle" fill="#e8d4b8" font-size="14">US-003</text></a>
      <a href="#FR-010"><rect x="100" y="70" width="55" height="20" rx="4" fill="#2563eb"/><text x="127" y="84" text-anchor="middle" fill="#e8d4b8" font-size="14">FR-010</text></a>
    </g>

    <!-- Cross-cutting: Lookup Chain Order (Row 2) -->
    <g transform="translate(20, 120)">
      <rect width="640" height="80" rx="4" fill="#0f172a" stroke="#475569"/>
      <text x="320" y="25" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="bold">LOOKUP CHAIN ORDER</text>
      <text x="20" y="50" fill="#64748b" font-size="14">1. product_cache (shared) | 2. Open Food Facts on miss | 3. manual naming, barcode preserved</text>
      <text x="20" y="70" fill="#64748b" font-size="14">Every outcome lands on the 049 confirm step - zero dead ends (SC-002)</text>
    </g>

    <!-- Success Criteria Summary (Row 2) -->
    <g transform="translate(940, 120)">
      <rect width="640" height="80" rx="4" fill="#0f172a" stroke="#22c55e"/>
      <text x="320" y="25" text-anchor="middle" fill="#22c55e" font-size="14" font-weight="bold">SUCCESS CRITERIA</text>
      <text x="20" y="50" fill="#94a3b8" font-size="14">SC-001: scan to list under 8s | SC-003: contributed name prefills cross-household within 1 min</text>
      <text x="20" y="70" fill="#94a3b8" font-size="14">SC-005: events carry capture_method barcode only for consenting members</text>
    </g>
  </g>

  <!-- Key Concepts Row (G-047) -->


  <text x="40" y="940" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#374151">Key Concepts:</text>
  <text x="140" y="940" font-family="system-ui, sans-serif" font-size="14" fill="#374151">lookup chain | shared product cache | Open Food Facts | confirm gate | rate limiting</text>

  <!-- SIGNATURE -->
  <text x="40" y="1060" fill="#374151" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">052:04 | Barcode Lookup Flow | eightysix</text>
</svg>
