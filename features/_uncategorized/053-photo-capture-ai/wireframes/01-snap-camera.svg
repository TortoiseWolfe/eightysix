      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Same surface, same submit path</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Third tab of the 049 sheet goes live - one</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">confirm step, consent gate unchanged.</text>
      <g transform="translate(38, 74)">
        <a href="#US-001"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-001</text></a>
        <a href="#FR-011" transform="translate(62, 0)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-011</text></a>
        <a href="#SC-006" transform="translate(124, 0)"><rect width="56" height="22" rx="11" fill="#ea580c"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">SC-006</text></a>
      </g>
    </g>
    <g transform="translate(20, 130)">
      <text x="0" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">SNAP GOES LIVE</text>
      <text x="0" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">The 049 capture sheet gains a working third tab: camera preview with rule-of-thirds guides, 64px capture button, Library and Flip alongside - Type and Scan stay one tap away.</text>
      <text x="0" y="64" font-family="system-ui, sans-serif" font-size="14" fill="#374151">This screen only photographs, compresses on device, and hands off - recognition and the prefilled confirm step follow on screen 02 through the single 049 submit path.</text>
    </g>
