  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <g transform="translate(20, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">One-tap capture, library alternative</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Camera with a single capture button, or pick</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">from the photo library - permission-aware.</text>
      <g transform="translate(38, 74)">
        <a href="#US-001"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-001</text></a>
        <a href="#FR-001" transform="translate(62, 0)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-001</text></a>
