      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Client-side compression</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">About 1024px leaves the device - the original</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">photo never does. Privacy by architecture.</text>
      <g transform="translate(38, 74)">
        <a href="#US-001"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-001</text></a>
        <a href="#US-004" transform="translate(62, 0)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-004</text></a>
        <a href="#FR-002" transform="translate(124, 0)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-002</text></a>
      </g>
    </g>
    <g transform="translate(940, 16)">
