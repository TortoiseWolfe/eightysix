      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">One item per photo guidance</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">The dominant-object contract is set up front</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">by the hint - suggestions stay editable.</text>
      <g transform="translate(38, 74)">
        <a href="#US-001"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-001</text></a>
        <a href="#US-002" transform="translate(62, 0)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
        <a href="#FR-005" transform="translate(124, 0)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="16" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-005</text></a>
