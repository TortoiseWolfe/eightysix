  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <g transform="translate(20, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Confidence is visible, not hidden</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">The 92% badge tells the member how much to</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">trust the suggestion before they confirm.</text>
      <a href="#US-001" transform="translate(38, 74)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-001</text></a>
      <a href="#FR-005" transform="translate(102, 74)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-005</text></a>
      <a href="#SC-001" transform="translate(166, 74)"><rect width="56" height="22" rx="11" fill="#ea580c"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">SC-001</text></a>
    </g>
    <g transform="translate(480, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Best-guess framing under 0.6</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Low confidence reads as a question with the name</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">field focused - correction is the easy path.</text>
      <a href="#US-002" transform="translate(38, 74)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <a href="#FR-006" transform="translate(102, 74)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-006</text></a>
    </g>
    <g transform="translate(940, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">No auto-add at ANY confidence</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">92% or 41%, nothing lands on the list until the</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">member taps 86 it. Cancel discards everything.</text>
      <a href="#US-002" transform="translate(38, 74)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <a href="#FR-007" transform="translate(102, 74)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-007</text></a>
      <a href="#SC-003" transform="translate(166, 74)"><rect width="56" height="22" rx="11" fill="#ea580c"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">SC-003</text></a>
    </g>
    <g transform="translate(1400, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Photo rides along</text>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">The compressed photo attaches to the item,</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">visible to household members only.</text>
      <a href="#US-004" transform="translate(38, 74)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-004</text></a>
      <a href="#FR-010" transform="translate(102, 74)"><rect width="56" height="22" rx="11" fill="#2563eb"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">FR-010</text></a>
    </g>
    <g transform="translate(20, 130)">
      <text x="0" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">WHAT SHIPS</text>
      <text x="0" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Recognition returns name, category, confidence from the server; the standard 049 confirm step opens prefilled. Edits always win - the suggestion never locks.</text>
      <text x="0" y="64" font-family="system-ui, sans-serif" font-size="14" fill="#374151">At or above 0.6: green badge, suggestion framing. Below 0.6: amber badge, Best guess heading, focused name field, Retake alongside 86 it.</text>
    </g>
  </g>
  <text x="40" y="1060" fill="#374151" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">053:02 | Confidence Confirm | eightysix</text>
