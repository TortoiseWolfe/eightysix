<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#c7ddf5"/><stop offset="100%" stop-color="#b8d4f0"/></linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <text x="960" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#4b5563" letter-spacing="1">CONVERSATIONS - /conversations (AS-IS)</text>
  <text x="40" y="52" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">DESKTOP (16:9)</text>
  <text x="1500" y="52" fill="#d946ef" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">MOBILE</text>

  <g id="desktop" transform="translate(40, 60)">
    <rect width="1280" height="720" rx="8" fill="#e8d4b8" stroke="#b8a080"/>
    <use href="includes/header-desktop.svg#desktop-header" x="0" y="0"/>

    <!-- Loading spinner (redirect in flight) -->
    <circle cx="640" cy="280" r="36" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-dasharray="20 12">
      <animateTransform attributeName="transform" type="rotate" from="0 640 280" to="360 640 280" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="640" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="#1f2937">Redirecting…</text>
    <text x="640" y="388" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Conversations moved to /messages?tab parameter of chats</text>

    <!-- Info panel -->
    <rect x="380" y="420" width="520" height="104" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="404" y="448" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">LEGACY ROUTE</text>
    <text x="404" y="476" font-family="system-ui, sans-serif" font-size="14" fill="#374151">/conversations now redirects to the unified</text>
    <text x="404" y="496" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Messages page with the chats view active.</text>
    <text x="404" y="516" font-family="monospace" font-size="14" fill="#6b7280">Feature 037 — Unified Messaging Sidebar</text>

    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>

    <g class="callout"><circle cx="596" cy="280" r="14" fill="#dc2626"/><text x="596" y="285" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
    <g class="callout"><circle cx="460" cy="360" r="14" fill="#dc2626"/><text x="460" y="365" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text></g>
    <g class="callout"><circle cx="360" cy="472" r="14" fill="#dc2626"/><text x="360" y="477" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text></g>
    <g class="callout"><circle cx="920" cy="516" r="14" fill="#dc2626"/><text x="920" y="521" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text></g>
  </g>

  <g id="mobile" transform="translate(1360, 60)">
    <rect width="360" height="720" rx="24" fill="#e8d4b8" stroke="#b8a080"/>
    <use href="includes/header-mobile.svg#mobile-header-group" x="0" y="0"/>

    <circle cx="180" cy="240" r="28" fill="none" stroke="#8b5cf6" stroke-width="3" stroke-dasharray="15 8">
      <animateTransform attributeName="transform" type="rotate" from="0 180 240" to="360 180 240" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="180" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#1f2937">Redirecting…</text>
    <text x="180" y="336" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Moved to /messages</text>

    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>
    <g class="callout"><circle cx="220" cy="240" r="11" fill="#dc2626"/><text x="220" y="245" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
  </g>

  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <g transform="translate(20, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Transient spinner</text>
      <a href="#us-001" transform="translate(180, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-001</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Users rarely see this — redirect fires on first</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">render via next/navigation redirect().</text>
    </g>
    <g transform="translate(480, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Target + tab param</text>
      <a href="#us-002" transform="translate(190, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Redirect target preserves tab parameter of chats so users</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">land in the right sidebar view automatically.</text>
    </g>
    <g transform="translate(940, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Legacy-route notice</text>
      <a href="#us-003" transform="translate(210, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-003</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Explains route consolidation — bookmarks and</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">old deep-links still work, they just forward.</text>
    </g>
    <g transform="translate(1400, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Feature-037 attribution</text>
      <a href="#us-004" transform="translate(270, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-004</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Historical note references the unification</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">feature for maintenance traceability.</text>
    </g>
    <g transform="translate(20, 130)">
      <text x="0" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">WHAT SHIPS</text>
      <text x="0" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Source: src/app/conversations/page.tsx — 12 lines, just `redirect('/messages?tab parameter of chats')`.</text>
      <text x="0" y="64" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Kept for backward compat with pre-F037 bookmarks. Removable once redirect logs confirm zero traffic.</text>
    </g>
  </g>
  <text x="40" y="1060" fill="#374151" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">999:27 | Conversations (as-is /conversations) | ScriptHammer</text>
</svg>
