      <text x="0" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Source: src/app/messages/setup/page.tsx — keyManagementService.initializeKeys(password).</text>
      <text x="0" y="64" font-family="system-ui, sans-serif" font-size="14" fill="#374151">OAuth users see "Since you signed in with [provider]…" copy variant (FR from 008).</text>
    </g>
