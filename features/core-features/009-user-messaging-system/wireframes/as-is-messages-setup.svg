    <text x="32" y="184" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Save this password!</text>
    <text x="32" y="204" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Encrypts your messages.</text>
    <text x="32" y="220" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Needed on new devices.</text>

    <text x="16" y="258" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">ACCOUNT</text>
    <rect x="16" y="266" width="328" height="40" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="28" y="291" font-family="system-ui, sans-serif" font-size="14" fill="#374151">jonpohlner@gmail.com</text>

    <text x="16" y="328" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">MSG PASSWORD</text>
    <rect x="16" y="336" width="328" height="40" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="28" y="361" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Create password</text>

    <text x="16" y="398" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">CONFIRM</text>
    <rect x="16" y="406" width="328" height="40" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="28" y="431" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Confirm password</text>

    <rect x="16" y="476" width="328" height="44" rx="4" fill="#8b5cf6"/>
    <text x="180" y="504" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">Set Up Messaging</text>

    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>
    <g class="callout"><circle cx="180" cy="500" r="11" fill="#dc2626"/><text x="180" y="505" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text></g>
  </g>

  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <g transform="translate(20, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Full page (not overlay)</text>
      <a href="#us-001" transform="translate(240, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-001</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Password-manager-friendly full page instead of</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">modal — browsers save credentials natively.</text>
    </g>
    <g transform="translate(480, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Info alert — "Save this"</text>
      <a href="#us-002" transform="translate(240, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Critical warning: forgetting this password</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">means losing access to all messages.</text>
    </g>
    <g transform="translate(940, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Password fields (with toggle)</text>
      <a href="#us-003" transform="translate(280, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-003</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">autoComplete="new-password" triggers PM save.</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Eye icon toggles visibility. Min 8 chars.</text>
    </g>
    <g transform="translate(1400, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Submit &amp; init keys</text>
      <a href="#us-004" transform="translate(210, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-004</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Derives key from password, initializes ECDH</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">pair, sends welcome message → redirect.</text>
    </g>
    <g transform="translate(20, 130)">
