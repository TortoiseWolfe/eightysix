    <!-- Body article -->
    <rect x="340" y="260" width="740" height="380" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="360" y="286" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1f2937">1. Why a template</text>
    <text x="360" y="312" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Starting a new web app is a solved problem —</text>
    <text x="360" y="332" font-family="system-ui, sans-serif" font-size="14" fill="#374151">yet every team ends up building the same scaffold</text>
    <text x="360" y="352" font-family="system-ui, sans-serif" font-size="14" fill="#374151">again. ScriptHammer ships the parts no one</text>
    <text x="360" y="372" font-family="system-ui, sans-serif" font-size="14" fill="#374151">enjoys writing twice: auth, GDPR, theming, PWA.</text>

    <text x="360" y="408" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1f2937">2. What's included</text>
    <text x="360" y="434" font-family="system-ui, sans-serif" font-size="14" fill="#374151">• Supabase auth (email + OAuth + magic links)</text>
    <text x="360" y="454" font-family="system-ui, sans-serif" font-size="14" fill="#374151">• 34 DaisyUI themes + custom variants</text>
    <text x="360" y="474" font-family="system-ui, sans-serif" font-size="14" fill="#374151">• PWA with service worker + offline queue</text>
    <text x="360" y="494" font-family="system-ui, sans-serif" font-size="14" fill="#374151">• 2,400+ tests (unit, a11y, E2E)</text>

    <!-- Share buttons -->
    <rect x="360" y="524" width="100" height="32" rx="16" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="410" y="544" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">Tweet</text>
