    <text x="522" y="544" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">LinkedIn</text>
    <rect x="584" y="524" width="100" height="32" rx="16" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="634" y="544" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">Copy link</text>

