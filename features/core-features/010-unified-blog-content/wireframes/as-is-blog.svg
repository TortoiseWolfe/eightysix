    <!-- Single column stack -->
    <rect x="16" y="138" width="328" height="150" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <rect x="16" y="138" width="328" height="60" rx="8" fill="#8b5cf6"/>
    <text x="28" y="218" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Welcome to ScriptHammer</text>
    <text x="28" y="242" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Modern template with defaults</text>
    <text x="28" y="272" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6">2025-09-15 · 5 min</text>

    <rect x="16" y="302" width="328" height="150" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <rect x="16" y="302" width="328" height="60" rx="8" fill="#ec4899"/>
    <text x="28" y="382" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Auto-Configuration System</text>
    <text x="28" y="406" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Detect project at build</text>
    <text x="28" y="436" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6">2025-10-02 · 8 min</text>

    <rect x="16" y="466" width="328" height="150" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <rect x="16" y="466" width="328" height="60" rx="8" fill="#06b6d4"/>
    <text x="28" y="546" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">GDPR Compliance in PWAs</text>
    <text x="28" y="570" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">GDPR, export, deletion</text>
    <text x="28" y="600" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6">2025-11-10 · 12 min</text>

    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>
    <g class="callout"><circle cx="180" cy="116" r="11" fill="#dc2626"/><text x="180" y="121" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
  </g>

  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <g transform="translate(20, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Page header</text>
      <a href="#us-001" transform="translate(140, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-001</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Just a subtitle tagline — no h1 actually</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">renders (Next Metadata sets document.title).</text>
    </g>
    <g transform="translate(480, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Posts grid</text>
      <a href="#us-002" transform="translate(130, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">BlogPostCard × N in 1/2/3-col responsive grid.</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Data from src/lib/blog/blog-data.json (SSG).</text>
    </g>
    <g transform="translate(940, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Static data source</text>
      <a href="#us-003" transform="translate(220, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-003</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">getPosts() reads JSON at build time (static</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">export). Filter: status === 'published'.</text>
    </g>
    <g transform="translate(1400, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Tags nav link</text>
      <a href="#us-004" transform="translate(130, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-004</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">"Browse by tag" →  /blog/tags — tag cloud</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">index for topical navigation.</text>
    </g>
    <g transform="translate(20, 130)">
      <text x="0" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">WHAT SHIPS</text>
      <text x="0" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Source: src/app/blog/page.tsx — async server component. Up to 100 posts rendered at build.</text>
      <text x="0" y="64" font-family="system-ui, sans-serif" font-size="14" fill="#374151">No client-side pagination in current build; full catalog on one page.</text>
    </g>
  </g>
  <text x="40" y="1060" fill="#374151" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">999:20 | Blog (as-is /blog) | ScriptHammer</text>
