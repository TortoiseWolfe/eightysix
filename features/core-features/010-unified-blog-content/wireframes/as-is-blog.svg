      <rect x="820" y="0" width="390" height="200" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
      <text x="1015" y="104" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">+ more posts</text>
