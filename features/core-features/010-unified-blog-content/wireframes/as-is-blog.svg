    <text x="640" y="628" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b5cf6">Browse by tag →</text>

    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>

    <g class="callout"><circle cx="40" cy="140" r="14" fill="#dc2626"/><text x="40" y="145" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
    <g class="callout"><circle cx="230" cy="190" r="14" fill="#dc2626"/><text x="230" y="195" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text></g>
    <g class="callout"><circle cx="50" cy="560" r="14" fill="#dc2626"/><text x="50" y="565" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text></g>
    <g class="callout"><circle cx="900" cy="580" r="14" fill="#dc2626"/><text x="900" y="585" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text></g>
  </g>

  <g id="mobile" transform="translate(1360, 60)">
