    <text x="525" y="31" text-anchor="middle" fill="#e8d4b8" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Features</text>

    <text x="640" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Thoughts, ideas, and insights from our team</text>

    <!-- 3-col posts grid -->
    <g transform="translate(40, 150)">
      <!-- Post 1 -->
      <rect x="0"   y="0" width="390" height="210" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
      <rect x="0"   y="0" width="390" height="90" rx="8" fill="#8b5cf6"/>
      <text x="20" y="52" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">[cover image]</text>
      <text x="20" y="120" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1f2937">Welcome to ScriptHammer</text>
      <text x="20" y="144" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">A modern Next.js template with batteries</text>
      <text x="20" y="162" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">included and thoughtful defaults.</text>
      <text x="20" y="192" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6">2025-09-15 · 5 min read · intro</text>

      <!-- Post 2 -->
      <rect x="410" y="0" width="390" height="210" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
      <rect x="410" y="0" width="390" height="90" rx="8" fill="#ec4899"/>
      <text x="430" y="52" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">[cover image]</text>
      <text x="430" y="120" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1f2937">Auto-Configuration System</text>
      <text x="430" y="144" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Detect project name, owner, repo URL at</text>
      <text x="430" y="162" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">build time. Zero manual config.</text>
      <text x="430" y="192" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6">2025-10-02 · 8 min read · architecture</text>

      <!-- Post 3 -->
      <rect x="820" y="0" width="390" height="210" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
      <rect x="820" y="0" width="390" height="90" rx="8" fill="#06b6d4"/>
      <text x="840" y="52" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">[cover image]</text>
      <text x="840" y="120" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1f2937">GDPR Compliance in PWAs</text>
      <text x="840" y="144" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">GDPR gates, data export, account</text>
      <text x="840" y="162" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">deletion — all static-export friendly.</text>
      <text x="840" y="192" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6">2025-11-10 · 12 min read · privacy</text>
