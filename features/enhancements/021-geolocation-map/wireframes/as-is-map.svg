<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#c7ddf5"/><stop offset="100%" stop-color="#b8d4f0"/></linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <text x="960" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#4b5563" letter-spacing="1">MAP PAGE - /map (AS-IS)</text>
  <text x="40" y="52" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">DESKTOP (16:9)</text>
  <text x="1500" y="52" fill="#d946ef" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">MOBILE</text>

  <g id="desktop" transform="translate(40, 60)">
    <rect width="1280" height="720" rx="8" fill="#e8d4b8" stroke="#b8a080"/>
    <use href="includes/header-desktop.svg#desktop-header" x="0" y="0"/>
    <rect x="380" y="3" width="64" height="44" rx="4" fill="#8b5cf6"/>
    <text x="412" y="31" text-anchor="middle" fill="#e8d4b8" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Map</text>

    <text x="40" y="108" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#1f2937">Interactive Map</text>
    <text x="40" y="138" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Explore and enable location services to see your current position.</text>

    <!-- Controls bar -->
    <rect x="40" y="164" width="280" height="44" rx="6" fill="#8b5cf6"/>
    <text x="180" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">📍 Enable Location</text>

    <rect x="340" y="164" width="300" height="44" rx="6" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="360" y="183" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">YOUR LOCATION</text>
    <text x="360" y="202" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">51.5042, -0.0905   ±18 m</text>

    <!-- Map canvas -->
    <rect x="40" y="224" width="1200" height="408" rx="12" fill="#dcc8a8" stroke="#b8a080"/>
    <g opacity="0.4">
      <path d="M 40 430 Q 300 380, 580 440 T 1240 400" stroke="#6b7280" stroke-width="2" fill="none"/>
      <path d="M 40 520 Q 400 480, 700 520 T 1240 540" stroke="#6b7280" stroke-width="2" fill="none"/>
      <circle cx="240" cy="400" r="18" fill="#c7ddf5" stroke="#374151"/>
      <circle cx="560" cy="460" r="14" fill="#c7ddf5" stroke="#374151"/>
      <circle cx="900" cy="420" r="20" fill="#c7ddf5" stroke="#374151"/>
    </g>
    <!-- User marker -->
    <circle cx="640" cy="480" r="14" fill="#ef4444" stroke="#fff" stroke-width="3"/>
    <circle cx="640" cy="480" r="28" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.5"/>
    <!-- Demo markers -->
    <circle cx="440" cy="360" r="10" fill="#8b5cf6" stroke="#fff" stroke-width="2"/>
    <circle cx="820" cy="540" r="10" fill="#8b5cf6" stroke="#fff" stroke-width="2"/>
    <!-- Attribution -->
    <text x="1220" y="622" text-anchor="end" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">© CartoDB · OSM</text>

    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>

    <g class="callout"><circle cx="40" cy="108" r="14" fill="#dc2626"/><text x="40" y="113" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
    <g class="callout"><circle cx="340" cy="186" r="14" fill="#dc2626"/><text x="340" y="191" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text></g>
    <g class="callout"><circle cx="672" cy="480" r="14" fill="#dc2626"/><text x="672" y="485" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text></g>
    <g class="callout"><circle cx="472" cy="360" r="14" fill="#dc2626"/><text x="472" y="365" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text></g>
  </g>

  <g id="mobile" transform="translate(1360, 60)">
    <rect width="360" height="720" rx="24" fill="#e8d4b8" stroke="#b8a080"/>
    <use href="includes/header-mobile.svg#mobile-header-group" x="0" y="0"/>

    <text x="180" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1f2937">Interactive Map</text>

    <rect x="16" y="156" width="328" height="40" rx="6" fill="#8b5cf6"/>
    <text x="180" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">📍 Enable Location</text>

    <rect x="16" y="212" width="328" height="420" rx="12" fill="#dcc8a8" stroke="#b8a080"/>
    <g opacity="0.4">
      <path d="M 16 400 Q 180 360, 344 420" stroke="#6b7280" stroke-width="2" fill="none"/>
      <circle cx="100" cy="340" r="12" fill="#c7ddf5" stroke="#374151"/>
    </g>
    <circle cx="180" cy="420" r="10" fill="#ef4444" stroke="#fff" stroke-width="2"/>
    <circle cx="180" cy="420" r="20" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>
    <text x="336" y="626" text-anchor="end" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">© CartoDB</text>

    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>
    <g class="callout"><circle cx="200" cy="420" r="11" fill="#dc2626"/><text x="200" y="425" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text></g>
  </g>

  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <g transform="translate(20, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Intro header</text>
      <a href="#us-001" transform="translate(150, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-001</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Warns if browser doesn&apos;t support geolocation</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">(uncommon — useGeolocation feature-detects).</text>
    </g>
    <g transform="translate(480, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Location readout</text>
      <a href="#us-002" transform="translate(190, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Lat/lng (4 decimal) + ±accuracy (m). Only shows</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">once consent is granted and getCurrentPosition().</text>
    </g>
    <g transform="translate(940, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">User marker + accuracy</text>
      <a href="#us-003" transform="translate(250, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-003</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Red pin with translucent radius visualizing GPS</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">accuracy. Popup shows precise coords.</text>
    </g>
    <g transform="translate(1400, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Demo markers</text>
      <a href="#us-004" transform="translate(160, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-004</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Two purple example markers with popup text —</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">demonstrates MapContainer marker API.</text>
    </g>
    <g transform="translate(20, 130)">
      <text x="0" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">WHAT SHIPS</text>
      <text x="0" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Source: src/app/map/page.tsx — dynamic import of MapContainer (Leaflet, SSR-disabled).</text>
      <text x="0" y="64" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Consent gate via GeolocationConsent with 1-year expiry, persisted in localStorage.</text>
    </g>
  </g>
  <text x="40" y="1060" fill="#374151" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">999:29 | Map Page (as-is /map) | ScriptHammer</text>
