    <text x="28" y="400" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">You · Round 2 · Cargo: 0</text>
    <text x="28" y="424" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">NPC · Round 1 · Cargo: 9</text>
    <text x="28" y="452" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Status: Rolling...</text>

    <!-- Rules collapsed (accordion-style summary) -->
    <rect x="16" y="488" width="328" height="40" rx="4" fill="#dcc8a8" stroke="#b8a080"/>
