    <text x="150" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#e8d4b8">Roll (2 left)</text>
    <rect x="260" y="360" width="180" height="48" rx="6" fill="#f5f0e6" stroke="#8b5cf6" stroke-width="2"/>
    <text x="350" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#8b5cf6">Hold</text>
    <rect x="460" y="360" width="180" height="48" rx="6" fill="#f5f0e6" stroke="#8b5cf6" stroke-width="2"/>
    <text x="550" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#8b5cf6">End Turn</text>

    <!-- Score board -->
    <rect x="60" y="432" width="760" height="156" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
