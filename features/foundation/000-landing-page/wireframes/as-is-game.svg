      <text x="161" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#1f2937">4</text>
      <rect x="198" y="0" width="58" height="58" rx="6" fill="#e8d4b8" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="3 2"/>
      <text x="227" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#8b5cf6">?</text>
      <rect x="264" y="0" width="58" height="58" rx="6" fill="#e8d4b8" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="3 2"/>
      <text x="293" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#8b5cf6">?</text>
