    <text x="180" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#e8d4b8" font-weight="600">Roll (2 left)</text>
    <rect x="16" y="298" width="156" height="40" rx="6" fill="#f5f0e6" stroke="#8b5cf6"/>
    <text x="94" y="324" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6" font-weight="600">Hold</text>
    <rect x="188" y="298" width="156" height="40" rx="6" fill="#f5f0e6" stroke="#8b5cf6"/>
    <text x="266" y="324" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6" font-weight="600">End Turn</text>

    <rect x="16" y="352" width="328" height="120" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
