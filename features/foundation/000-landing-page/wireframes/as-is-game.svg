    <text x="80" y="490" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#1f2937">You</text>
    <text x="200" y="490" font-family="system-ui, sans-serif" font-size="16" fill="#1f2937">Round 2 · Cargo: 0</text>
    <text x="80" y="522" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#1f2937">NPC</text>
    <text x="200" y="522" font-family="system-ui, sans-serif" font-size="16" fill="#1f2937">Round 1 · Cargo: 9</text>
    <text x="80" y="566" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#4b5563">Status: Rolling...</text>

    <!-- Rules sidebar (sticky on real page) -->
    <rect x="880" y="166" width="380" height="440" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="900" y="194" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1f2937">How to Play</text>
    <text x="900" y="224" font-family="system-ui, sans-serif" font-size="14" fill="#374151"><tspan font-weight="700" fill="#8b5cf6">1.</tspan> Roll five dice to get a Ship (6),</text>
    <text x="900" y="242" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Captain (5), and Crew (4) in order</text>
    <text x="900" y="274" font-family="system-ui, sans-serif" font-size="14" fill="#374151"><tspan font-weight="700" fill="#8b5cf6">2.</tspan> Remaining 2 dice = cargo score</text>
    <text x="900" y="306" font-family="system-ui, sans-serif" font-size="14" fill="#374151"><tspan font-weight="700" fill="#8b5cf6">3.</tspan> Three rolls per turn</text>
    <text x="900" y="338" font-family="system-ui, sans-serif" font-size="14" fill="#374151"><tspan font-weight="700" fill="#8b5cf6">4.</tspan> Beat the NPC to win!</text>

    <line x1="900" y1="368" x2="1240" y2="368" stroke="#b8a080"/>
    <text x="900" y="392" font-family="system-ui, sans-serif" font-size="14" fill="#374151"><tspan font-weight="700">Tip:</tspan> Higher cargo scores win</text>
    <text x="900" y="412" font-family="system-ui, sans-serif" font-size="14" fill="#374151">rounds.</text>
    <text x="900" y="442" font-family="system-ui, sans-serif" font-size="14" fill="#374151"><tspan font-weight="700">Tie:</tspan> Cargo sums determine</text>
    <text x="900" y="462" font-family="system-ui, sans-serif" font-size="14" fill="#374151">the winner.</text>

    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>

    <g class="callout"><circle cx="640" cy="114" r="14" fill="#dc2626"/><text x="640" y="119" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
    <g class="callout"><circle cx="456" cy="254" r="14" fill="#dc2626"/><text x="456" y="259" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text></g>
    <g class="callout"><circle cx="660" cy="384" r="14" fill="#dc2626"/><text x="660" y="389" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text></g>
    <g class="callout"><circle cx="1060" cy="190" r="14" fill="#dc2626"/><text x="1060" y="195" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text></g>
  </g>

  <g id="mobile" transform="translate(1360, 60)">
