      <text x="232" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Crew ✓</text>

      <rect x="288" y="0" width="80" height="80" rx="8" fill="#e8d4b8" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4 2"/>
      <text x="328" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="700" fill="#8b5cf6">?</text>
      <text x="328" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6">Cargo</text>

      <rect x="384" y="0" width="80" height="80" rx="8" fill="#e8d4b8" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4 2"/>
      <text x="424" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="700" fill="#8b5cf6">?</text>
      <text x="424" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6">Cargo</text>
