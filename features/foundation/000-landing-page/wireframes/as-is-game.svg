<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c7ddf5"/>
      <stop offset="100%" stop-color="#b8d4f0"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <text x="960" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#4b5563" letter-spacing="1">CAPTAIN SHIP CREW - /game (AS-IS)</text>
  <text x="40" y="52" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">DESKTOP (16:9)</text>
  <text x="1500" y="52" fill="#d946ef" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">MOBILE</text>

  <g id="desktop" transform="translate(40, 60)">
    <rect width="1280" height="720" rx="8" fill="#e8d4b8" stroke="#b8a080"/>
    <use href="includes/header-desktop.svg#desktop-header" x="0" y="0"/>
    <rect x="400" y="3" width="70" height="44" rx="4" fill="#8b5cf6"/>
    <text x="435" y="31" text-anchor="middle" fill="#e8d4b8" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Home</text>

    <!-- Compact header -->
    <text x="640" y="114" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#1f2937">Captain, Ship &amp; Crew</text>
    <text x="640" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Roll for your ship, captain, and crew!</text>

    <!-- 2-col game layout: game area left (2 cols) + rules right (1 col) -->
    <!-- Game area -->
    <rect x="40" y="166" width="820" height="440" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="60" y="194" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">DICE AREA</text>

    <!-- 5 dice (one set for player) -->
    <g transform="translate(60, 214)">
      <rect x="0"   y="0" width="80" height="80" rx="8" fill="#f5f0e6" stroke="#1f2937" stroke-width="2"/>
      <text x="40" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="700" fill="#1f2937">6</text>
      <text x="40" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Ship ✓</text>

      <rect x="96"  y="0" width="80" height="80" rx="8" fill="#f5f0e6" stroke="#1f2937" stroke-width="2"/>
      <text x="136" y="52" text-anchor="middle" font-family="system-ui, sans-serif" font-size="40" font-weight="700" fill="#1f2937">5</text>
      <text x="136" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Captain ✓</text>

      <rect x="192" y="0" width="80" height="80" rx="8" fill="#f5f0e6" stroke="#1f2937" stroke-width="2"/>
