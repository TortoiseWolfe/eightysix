      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">SVG canvas</text>
      <a href="#us-002" transform="translate(140, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Inline-rendered SVG (sanitized, zoom + pan</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">enabled). URL hash pins to specific wireframe.</text>
    </g>

    <g transform="translate(1400, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Prev / Next + counter</text>
      <a href="#us-003" transform="translate(240, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-003</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">← / → arrow buttons, "N / total" counter,</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">keyboard F for focus mode, Shift-L for legend.</text>
    </g>

    <g transform="translate(20, 130)">
