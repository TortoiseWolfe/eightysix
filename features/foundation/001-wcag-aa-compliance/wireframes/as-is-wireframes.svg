      <text x="20" y="186" fill="#cbd5e1">001 · /accessibility ✅</text>
      <text x="20" y="210" fill="#cbd5e1">001 · /themes ✅</text>

      <rect x="0" y="232" width="260" height="36" fill="#8b5cf6"/>
