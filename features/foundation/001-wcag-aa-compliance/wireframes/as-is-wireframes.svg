      <text x="0" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Source: src/app/wireframes/page.tsx + .specify/extensions/wireframe/viewer/viewer.html (synced to public/).</text>
      <text x="0" y="64" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Manifest auto-discovered at build via scripts/sync-wireframes.sh → wireframes-manifest.json.</text>
    </g>
