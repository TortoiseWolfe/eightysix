      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Iframe wrapper</text>
      <a href="#us-001" transform="translate(150, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-001</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">src/app/wireframes/page.tsx is a thin iframe</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">loading /wireframes/viewer.html + loading spinner.</text>
