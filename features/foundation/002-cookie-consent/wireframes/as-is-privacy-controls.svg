  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <text x="960" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#4b5563" letter-spacing="1">PRIVACY CONTROLS - /privacy-controls (AS-IS)</text>
  <text x="40" y="52" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">DESKTOP (16:9)</text>
  <text x="1500" y="52" fill="#d946ef" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">MOBILE</text>

  <g id="desktop" transform="translate(40, 60)">
    <rect width="1280" height="720" rx="8" fill="#e8d4b8" stroke="#b8a080"/>
    <use href="includes/header-desktop.svg#desktop-header" x="0" y="0"/>
    <rect x="660" y="3" width="80" height="44" rx="4" fill="#8b5cf6"/>
    <text x="700" y="31" text-anchor="middle" fill="#e8d4b8" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Account</text>

    <text x="200" y="118" font-family="system-ui, sans-serif" font-size="32" font-weight="bold" fill="#1f2937">Privacy Controls</text>
    <text x="200" y="154" font-family="system-ui, sans-serif" font-size="16" fill="#4b5563">Manage your privacy settings, export your data, and exercise your GDPR rights from this central control panel.</text>

    <!-- PrivacyControls component: toggle rows + action buttons -->
    <rect x="200" y="194" width="880" height="380" rx="8" fill="#dcc8a8" stroke="#b8a080"/>

    <text x="220" y="220" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">CONSENT TOGGLES</text>
    <!-- Row 1: Analytics -->
    <rect x="220" y="232" width="840" height="44" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="236" y="252" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f2937">Analytics</text>
    <text x="236" y="270" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Anonymous page views for Google Analytics</text>
    <rect x="1000" y="246" width="44" height="24" rx="12" fill="#22c55e"/>
    <circle cx="1028" cy="258" r="10" fill="#fff"/>
    <!-- Row 2: Marketing -->
