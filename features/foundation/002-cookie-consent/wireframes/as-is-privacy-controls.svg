    <text x="40" y="216" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f2937">Analytics</text>
    <text x="40" y="232" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">GA anonymous views</text>
    <rect x="290" y="210" width="32" height="16" rx="8" fill="#22c55e"/>

    <rect x="28" y="244" width="304" height="42" rx="4" fill="#f5f0e6"/>
