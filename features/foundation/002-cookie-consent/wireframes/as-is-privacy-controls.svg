    <text x="180" y="414" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff">Delete Account</text>

    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>
    <g class="callout"><circle cx="322" cy="218" r="11" fill="#dc2626"/><text x="322" y="223" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text></g>
    <g class="callout"><circle cx="180" cy="404" r="11" fill="#dc2626"/><text x="180" y="409" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text></g>
  </g>

