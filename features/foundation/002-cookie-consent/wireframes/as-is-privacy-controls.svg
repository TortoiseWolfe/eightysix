      <a href="#us-001" transform="translate(110, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-001</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">h1 + lead paragraph explaining the GDPR</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">central control panel purpose.</text>
    </g>
