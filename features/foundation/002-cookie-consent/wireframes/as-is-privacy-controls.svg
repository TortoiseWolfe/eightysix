    <text x="236" y="304" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f2937">Marketing</text>
    <text x="236" y="322" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Email communication and newsletter preferences</text>
    <rect x="1000" y="298" width="44" height="24" rx="12" fill="#6b7280"/>
    <circle cx="1014" cy="310" r="10" fill="#fff"/>
    <!-- Row 3: Functional -->
