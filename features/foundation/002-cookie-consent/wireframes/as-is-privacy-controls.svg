    <rect x="28" y="348" width="304" height="36" rx="6" fill="#8b5cf6"/>
    <text x="180" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">Export My Data</text>
