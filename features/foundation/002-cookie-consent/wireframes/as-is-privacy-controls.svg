    <text x="280" y="612" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6" font-weight="600">Privacy Policy</text>
    <rect x="370" y="590" width="160" height="36" rx="6" fill="#f5f0e6" stroke="#8b5cf6"/>
    <text x="450" y="612" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6" font-weight="600">Cookie Policy</text>

    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>
    <g class="callout"><circle cx="170" cy="118" r="14" fill="#dc2626"/><text x="170" y="123" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
    <g class="callout"><circle cx="1070" cy="254" r="14" fill="#dc2626"/><text x="1070" y="259" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text></g>
    <g class="callout"><circle cx="864" cy="450" r="14" fill="#dc2626"/><text x="864" y="455" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text></g>
    <g class="callout"><circle cx="280" cy="580" r="14" fill="#dc2626"/><text x="280" y="585" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text></g>
