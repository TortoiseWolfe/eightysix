    <text x="236" y="356" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f2937">Functional</text>
    <text x="236" y="374" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Essential cookies (required — cannot be disabled)</text>
    <rect x="1000" y="350" width="44" height="24" rx="12" fill="#22c55e" opacity="0.5"/>
    <circle cx="1028" cy="362" r="10" fill="#fff"/>

    <!-- GDPR action buttons -->
