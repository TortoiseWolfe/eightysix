    <text x="40" y="280" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Newsletter emails</text>
    <rect x="290" y="258" width="32" height="16" rx="8" fill="#6b7280"/>

    <rect x="28" y="292" width="304" height="42" rx="4" fill="#f5f0e6"/>
