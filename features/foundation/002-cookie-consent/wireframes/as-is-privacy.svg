    <text x="200" y="238" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Last updated: 2025-09-15</text>

    <text x="200" y="278" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1f2937">1. Introduction</text>
    <text x="200" y="306" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Welcome to ScriptHammer. We are committed to protecting your privacy and ensuring you</text>
    <text x="200" y="326" font-family="system-ui, sans-serif" font-size="14" fill="#374151">have a positive experience on our website. This privacy policy explains how we collect,</text>
    <text x="200" y="346" font-family="system-ui, sans-serif" font-size="14" fill="#374151">use, and protect your personal information in compliance with GDPR and other applicable</text>
    <text x="200" y="366" font-family="system-ui, sans-serif" font-size="14" fill="#374151">privacy laws.</text>

    <text x="200" y="406" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1f2937">10. Children's Privacy</text>
    <text x="200" y="434" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Our website is not intended for children under 16 years of age...</text>

    <text x="200" y="474" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1f2937">11. Changes to This Policy</text>
    <text x="200" y="502" font-family="system-ui, sans-serif" font-size="14" fill="#374151">We may update this privacy policy from time to time...</text>

    <text x="200" y="560" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563" font-style="italic">3 sections shipped today; spec 002 calls for sections 2–9 (data collection, usage, sharing,</text>
    <text x="200" y="580" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563" font-style="italic">user rights, cookies, third parties, security, retention) — currently gaps in the prose.</text>

