<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c7ddf5"/>
      <stop offset="100%" stop-color="#b8d4f0"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <text x="960" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#4b5563" letter-spacing="1">OAUTH CALLBACK - /auth/callback (AS-IS)</text>
  <text x="40" y="52" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">DESKTOP (16:9)</text>
  <text x="1500" y="52" fill="#d946ef" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">MOBILE</text>

  <g id="desktop" transform="translate(40, 60)">
    <rect width="1280" height="720" rx="8" fill="#e8d4b8" stroke="#b8a080"/>
    <use href="includes/header-desktop.svg#desktop-header" x="0" y="0"/>
    <!-- No active nav — this is a transit page -->

    <!-- Loading state centered -->
    <circle cx="640" cy="280" r="36" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-dasharray="20 12">
      <animateTransform attributeName="transform" type="rotate" from="0 640 280" to="360 640 280" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="640" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="#1f2937">Completing sign-in…</text>
    <text x="640" y="388" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">We're exchanging the OAuth code for a session.</text>
    <text x="640" y="408" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">You'll be redirected in a moment.</text>

    <!-- Debug info (only shows in dev) -->
    <rect x="440" y="440" width="400" height="92" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="454" y="462" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">DEBUG (dev only)</text>
    <text x="454" y="484" font-family="monospace" font-size="14" fill="#374151">URL has code: true, has error: false</text>
    <text x="454" y="504" font-family="monospace" font-size="14" fill="#374151">isLoading: true, user: null</text>
    <text x="454" y="524" font-family="monospace" font-size="14" fill="#374151">Provider: github · Redirect → /profile</text>

    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>

    <g class="callout"><circle cx="596" cy="280" r="14" fill="#dc2626"/><text x="596" y="285" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
    <g class="callout"><circle cx="460" cy="360" r="14" fill="#dc2626"/><text x="460" y="365" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text></g>
    <g class="callout"><circle cx="416" cy="480" r="14" fill="#dc2626"/><text x="416" y="485" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text></g>
    <g class="callout"><circle cx="870" cy="524" r="14" fill="#dc2626"/><text x="870" y="529" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text></g>
  </g>

  <g id="mobile" transform="translate(1360, 60)">
    <rect width="360" height="720" rx="24" fill="#e8d4b8" stroke="#b8a080"/>
    <use href="includes/header-mobile.svg#mobile-header-group" x="0" y="0"/>

    <circle cx="180" cy="240" r="28" fill="none" stroke="#8b5cf6" stroke-width="3" stroke-dasharray="15 8">
      <animateTransform attributeName="transform" type="rotate" from="0 180 240" to="360 180 240" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="180" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#1f2937">Completing sign-in…</text>
    <text x="180" y="336" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Exchanging OAuth code.</text>
    <text x="180" y="354" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Redirecting…</text>

    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>
    <g class="callout"><circle cx="220" cy="240" r="11" fill="#dc2626"/><text x="220" y="245" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
  </g>

  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <g transform="translate(20, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Loading spinner</text>
      <a href="#us-001" transform="translate(170, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-001</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Rotating dashed ring. Transit page — user</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">never stays here long.</text>
    </g>
    <g transform="translate(480, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Status copy</text>
      <a href="#us-002" transform="translate(130, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">"Completing sign-in…" reassurance during the</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">brief pause between OAuth return and redirect.</text>
    </g>
    <g transform="translate(940, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Dev-only debug panel</text>
      <a href="#us-003" transform="translate(230, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-003</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Shows URL parse state + user state. Hidden in</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">production; helps diagnose OAuth failures.</text>
    </g>
    <g transform="translate(1400, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">OAuth profile population</text>
      <a href="#us-004" transform="translate(270, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-004</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">populateOAuthProfile() runs before redirect</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">(FR-001). Non-blocking per NFR-001.</text>
    </g>
    <g transform="translate(20, 130)">
      <text x="0" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">WHAT SHIPS</text>
      <text x="0" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Source: src/app/auth/callback/page.tsx — client component, uses AuthContext + OAuthErrorBoundary.</text>
      <text x="0" y="64" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Supabase handles state validation internally. Final redirect target: /profile (or returnUrl from session).</text>
    </g>
  </g>
  <text x="40" y="1060" fill="#374151" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">999:16 | OAuth Callback (as-is /auth/callback) | ScriptHammer</text>
</svg>
