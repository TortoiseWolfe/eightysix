    <text x="180" y="436" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563" font-style="italic">Token from URL hash</text>

    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>
    <g class="callout"><circle cx="180" cy="356" r="11" fill="#dc2626"/><text x="180" y="361" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text></g>
  </g>

  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <g transform="translate(20, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Entry from email link</text>
      <a href="#us-001" transform="translate(220, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-001</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">User reaches this page only via email link</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">sent from /forgot-password. Client component.</text>
    </g>
    <g transform="translate(480, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Password + Confirm</text>
      <a href="#us-002" transform="translate(220, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Two fields to catch typos. Same validation</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">as signup (8+ chars, upper, number, symbol).</text>
    </g>
    <g transform="translate(940, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Submit → /sign-in</text>
      <a href="#us-003" transform="translate(200, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-003</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">onSuccess redirects to /sign-in with new</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">password. Supabase.updateUser() under the hood.</text>
    </g>
    <g transform="translate(1400, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Token from URL hash</text>
      <a href="#us-004" transform="translate(230, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-004</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Supabase passes token_hash + type=recovery</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">in the URL. ResetPasswordForm reads them.</text>
    </g>
    <g transform="translate(20, 130)">
      <text x="0" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">WHAT SHIPS</text>
      <text x="0" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Source: src/app/reset-password/page.tsx — client component, wraps ResetPasswordForm molecule.</text>
      <text x="0" y="64" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Minimal skeleton — most logic lives in the form component (token parsing + password update).</text>
    </g>
