    <g class="callout"><circle cx="900" cy="244" r="14" fill="#dc2626"/><text x="900" y="249" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text></g>
    <g class="callout"><circle cx="900" cy="376" r="14" fill="#dc2626"/><text x="900" y="381" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text></g>
    <g class="callout"><circle cx="900" cy="478" r="14" fill="#dc2626"/><text x="900" y="483" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text></g>
