    <text x="700" y="31" text-anchor="middle" fill="#e8d4b8" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Account</text>

    <text x="640" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#1f2937">Set New Password</text>

    <rect x="416" y="180" width="448" height="260" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
