    <text x="436" y="284" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1f2937">Confirm New Password</text>
    <rect x="436" y="294" width="408" height="44" rx="4" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="452" y="320" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">••••••••</text>

