    <text x="700" y="31" text-anchor="middle" fill="#e8d4b8" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Account</text>

    <text x="640" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#1f2937">Verify Your Email</text>

    <!-- EmailVerificationNotice alert -->
    <rect x="416" y="176" width="448" height="120" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
    <text x="440" y="206" font-family="system-ui, sans-serif" font-size="22" fill="#f59e0b">✉</text>
    <text x="474" y="204" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1f2937">Confirmation email sent</text>
    <text x="474" y="226" font-family="system-ui, sans-serif" font-size="14" fill="#374151">We sent a verification link to your inbox.</text>
    <text x="474" y="246" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Click the link to activate your account.</text>

    <rect x="474" y="254" width="160" height="32" rx="4" fill="#f5f0e6" stroke="#f59e0b"/>
    <text x="554" y="274" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#f59e0b" font-weight="600">Resend email</text>

    <text x="640" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Check your inbox for a verification link. Once verified,</text>
    <text x="640" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#374151">you'll be able to access all features.</text>

    <text x="640" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6" text-decoration="underline">Go to profile</text>

    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>

    <g class="callout"><circle cx="640" cy="120" r="14" fill="#dc2626"/><text x="640" y="125" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
    <g class="callout"><circle cx="880" cy="204" r="14" fill="#dc2626"/><text x="880" y="209" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text></g>
    <g class="callout"><circle cx="650" cy="270" r="14" fill="#dc2626"/><text x="650" y="275" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text></g>
    <g class="callout"><circle cx="750" cy="412" r="14" fill="#dc2626"/><text x="750" y="417" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text></g>
  </g>

  <g id="mobile" transform="translate(1360, 60)">
