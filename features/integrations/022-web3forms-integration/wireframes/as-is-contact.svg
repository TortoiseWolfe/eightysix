<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#c7ddf5"/><stop offset="100%" stop-color="#b8d4f0"/></linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <text x="960" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#4b5563" letter-spacing="1">CONTACT PAGE - /contact (AS-IS)</text>
  <text x="40" y="52" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">DESKTOP (16:9)</text>
  <text x="1500" y="52" fill="#d946ef" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">MOBILE</text>

  <g id="desktop" transform="translate(40, 60)">
    <rect width="1280" height="720" rx="8" fill="#e8d4b8" stroke="#b8a080"/>
    <use href="includes/header-desktop.svg#desktop-header" x="0" y="0"/>

    <text x="640" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#1f2937">Get in Touch</text>
    <text x="640" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Have a question, suggestion, or just want to say hello? We&apos;d love to hear from you!</text>

    <!-- 2-col layout -->
    <!-- Left col: "Why contact us" + other ways -->
    <g transform="translate(100, 180)">
      <text x="0" y="20" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1f2937">Why Contact Us?</text>
      <text x="0" y="56" font-family="system-ui, sans-serif" font-size="14" fill="#374151">✓ Report bugs or issues</text>
      <text x="0" y="80" font-family="system-ui, sans-serif" font-size="14" fill="#374151">✓ Request new features</text>
      <text x="0" y="104" font-family="system-ui, sans-serif" font-size="14" fill="#374151">✓ Get help with implementation</text>
      <text x="0" y="128" font-family="system-ui, sans-serif" font-size="14" fill="#374151">✓ Share your feedback</text>

      <text x="0" y="176" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#1f2937">Response Time</text>
      <text x="0" y="200" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">We typically respond within 24-48 hours on business days.</text>

      <text x="0" y="244" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#1f2937">Other Ways to Connect</text>
      <text x="0" y="276" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6">⎘ GitHub Issues</text>
      <text x="0" y="300" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6">⎘ GitHub Discussions</text>
    </g>

    <!-- Right col: ContactForm card -->
    <rect x="660" y="180" width="520" height="400" rx="12" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="684" y="220" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1f2937">Send us a message</text>

    <text x="684" y="260" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4b5563">Name *</text>
    <rect x="684" y="270" width="464" height="40" rx="4" fill="#f5f0e6" stroke="#b8a080"/>

    <text x="684" y="328" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4b5563">Email *</text>
    <rect x="684" y="338" width="464" height="40" rx="4" fill="#f5f0e6" stroke="#b8a080"/>

    <text x="684" y="396" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4b5563">Message *</text>
    <rect x="684" y="406" width="464" height="100" rx="4" fill="#f5f0e6" stroke="#b8a080"/>

    <rect x="684" y="524" width="464" height="44" rx="4" fill="#8b5cf6"/>
    <text x="916" y="552" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">Send Message</text>

    <text x="640" y="614" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Your privacy is important to us. We&apos;ll never share your information.</text>

    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>

    <g class="callout"><circle cx="640" cy="112" r="14" fill="#dc2626"/><text x="640" y="117" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
    <g class="callout"><circle cx="66" cy="200" r="14" fill="#dc2626"/><text x="66" y="205" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text></g>
    <g class="callout"><circle cx="1178" cy="220" r="14" fill="#dc2626"/><text x="1178" y="225" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text></g>
    <g class="callout"><circle cx="1178" cy="546" r="14" fill="#dc2626"/><text x="1178" y="551" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text></g>
  </g>

  <g id="mobile" transform="translate(1360, 60)">
