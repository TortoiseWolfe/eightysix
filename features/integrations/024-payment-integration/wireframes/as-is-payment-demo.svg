    <text x="180" y="364" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">Accept &amp; Continue</text>

    <rect x="16" y="416" width="328" height="200" rx="12" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="32" y="444" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1f2937">Step 2: Pay</text>
    <rect x="32" y="464" width="296" height="40" rx="4" fill="#8b5cf6"/>
    <text x="180" y="488" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">Pay $20</text>
    <rect x="32" y="512" width="296" height="40" rx="4" fill="#f59e0b"/>
    <text x="180" y="536" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff">$9.99/mo</text>
    <rect x="32" y="560" width="296" height="40" rx="4" fill="#22c55e"/>
    <text x="180" y="584" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff">PayPal $15</text>

    <use href="includes/footer-mobile.svg#mobile-bottom-nav" x="0" y="664"/>
    <g class="callout"><circle cx="180" cy="128" r="11" fill="#dc2626"/><text x="180" y="133" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text></g>
  </g>

  <g id="annotations" transform="translate(40, 800)">
    <rect width="1840" height="220" rx="8" fill="#dcc8a8" stroke="#b8a080"/>
    <g transform="translate(20, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">ProtectedRoute + auth banner</text>
      <a href="#us-001" transform="translate(310, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-001</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Wrapped in ProtectedRoute (redirect /sign-in)</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">+ EmailVerificationNotice if unconfirmed.</text>
    </g>
    <g transform="translate(480, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">GDPR card (pre-script)</text>
      <a href="#us-002" transform="translate(250, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-002</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Blocks 3rd-party script load until consent via</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">usePaymentConsent → localStorage.</text>
    </g>
    <g transform="translate(940, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">PaymentButton variants</text>
      <a href="#us-003" transform="translate(270, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-003</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">One-time, recurring, PayPal — same component</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">via type + provider props.</text>
    </g>
    <g transform="translate(1400, 16)">
      <circle cx="14" cy="14" r="12" fill="#dc2626"/>
      <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text>
      <text x="38" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">History with filters</text>
      <a href="#us-004" transform="translate(220, 5)"><rect width="56" height="22" rx="11" fill="#0891b2"/><text x="28" y="17" text-anchor="middle" fill="#f5f0e6" font-size="14" font-weight="700">US-004</text></a>
      <text x="38" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">PaymentHistory organism: 50/page, filter by</text>
      <text x="38" y="62" font-family="system-ui, sans-serif" font-size="14" fill="#374151">provider/status, real-time Supabase updates.</text>
    </g>
    <g transform="translate(20, 130)">
      <text x="0" y="19" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#4b5563" letter-spacing="1">WHAT SHIPS</text>
      <text x="0" y="44" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Source: src/app/payment-demo/page.tsx — client component, ProtectedRoute wrapper.</text>
      <text x="0" y="64" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Shows "providers not configured" warning if NEXT_PUBLIC_STRIPE_* / NEXT_PUBLIC_PAYPAL_* unset.</text>
    </g>
  </g>
  <text x="40" y="1060" fill="#374151" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">999:32 | Payment Demo (as-is /payment-demo) | ScriptHammer</text>
