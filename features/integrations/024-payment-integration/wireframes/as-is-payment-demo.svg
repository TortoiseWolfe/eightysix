<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#c7ddf5"/><stop offset="100%" stop-color="#b8d4f0"/></linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <text x="960" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#4b5563" letter-spacing="1">PAYMENT DEMO PAGE - /payment-demo (AS-IS)</text>
  <text x="40" y="52" fill="#8b5cf6" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">DESKTOP (16:9)</text>
  <text x="1500" y="52" fill="#d946ef" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">MOBILE</text>

  <g id="desktop" transform="translate(40, 60)">
    <rect width="1280" height="720" rx="8" fill="#e8d4b8" stroke="#b8a080"/>
    <use href="includes/header-desktop.svg#desktop-header" x="0" y="0"/>

    <text x="40" y="100" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#1f2937">Payment Integration Demo</text>
    <text x="40" y="128" font-family="system-ui, sans-serif" font-size="14" fill="#4b5563">Explore payment features: Stripe integration, GDPR, offline queue, history.</text>

    <!-- Alert banner: logged in as -->
    <rect x="40" y="148" width="1200" height="40" rx="6" fill="#c7ddf5" stroke="#3b82f6"/>
    <text x="56" y="172" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">ℹ Logged in as: jonpohlner@gmail.com · User ID: abc123…</text>

    <!-- Step 1: GDPR -->
    <rect x="40" y="208" width="590" height="220" rx="12" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="64" y="240" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1f2937">Step 1: GDPR Consent</text>
    <text x="64" y="264" font-family="system-ui, sans-serif" font-size="14" fill="#374151">We need your consent to load 3rd-party</text>
    <text x="64" y="282" font-family="system-ui, sans-serif" font-size="14" fill="#374151">payment scripts (Stripe, PayPal).</text>
    <rect x="64" y="300" width="540" height="76" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="80" y="322" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">What this means:</text>
    <text x="80" y="342" font-family="system-ui, sans-serif" font-size="14" fill="#374151">• External scripts from Stripe / PayPal</text>
    <text x="80" y="360" font-family="system-ui, sans-serif" font-size="14" fill="#374151">• No scripts loaded without consent</text>
    <rect x="64" y="388" width="260" height="32" rx="4" fill="#8b5cf6"/>
    <text x="194" y="408" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">Accept &amp; Continue</text>
    <rect x="336" y="388" width="140" height="32" rx="4" fill="#f5f0e6" stroke="#8b5cf6"/>
    <text x="406" y="408" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6">Decline</text>

    <!-- Step 2: Pay buttons -->
    <rect x="650" y="208" width="590" height="220" rx="12" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="674" y="240" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1f2937">Step 2: Make a Payment</text>
    <text x="674" y="264" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Use test card 4242 4242 4242 4242.</text>
    <rect x="674" y="292" width="540" height="104" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <rect x="690" y="308" width="170" height="36" rx="4" fill="#8b5cf6"/>
    <text x="775" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e8d4b8">Pay $20 (one-time)</text>
    <rect x="874" y="308" width="190" height="36" rx="4" fill="#f59e0b"/>
    <text x="969" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff">Subscribe $9.99/mo</text>
    <rect x="690" y="352" width="160" height="36" rx="4" fill="#22c55e"/>
    <text x="770" y="374" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff">PayPal $15</text>

    <!-- Step 4: History -->
    <rect x="40" y="448" width="1200" height="172" rx="12" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="64" y="478" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1f2937">Step 4: Payment History</text>
    <text x="1220" y="478" text-anchor="end" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">Filters ▾</text>

    <line x1="64" y1="492" x2="1216" y2="492" stroke="#b8a080"/>
    <text x="64" y="516" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">2026-04-18  Stripe  $20.00 USD  ✓ succeeded</text>
    <text x="64" y="540" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">2026-04-15  PayPal  $15.00 USD  ✓ succeeded</text>
    <text x="64" y="564" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">2026-04-10  Stripe  $9.99 USD  ⟳ recurring</text>
    <text x="64" y="588" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">2026-04-03  Stripe  $20.00 USD  ✗ declined</text>
    <text x="1216" y="612" text-anchor="end" font-family="system-ui, sans-serif" font-size="14" fill="#8b5cf6">Next page →</text>

    <use href="includes/footer-desktop.svg#site-footer" x="0" y="640"/>

