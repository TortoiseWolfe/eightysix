    <g class="callout"><circle cx="230" cy="240" r="14" fill="#dc2626"/><text x="230" y="245" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text></g>
    <g class="callout"><circle cx="860" cy="240" r="14" fill="#dc2626"/><text x="860" y="245" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text></g>
    <g class="callout"><circle cx="240" cy="478" r="14" fill="#dc2626"/><text x="240" y="483" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">4</text></g>
  </g>

