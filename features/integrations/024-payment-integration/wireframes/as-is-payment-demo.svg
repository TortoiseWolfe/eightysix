    <text x="180" y="174" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#1f2937">Logged in · abc123…</text>

    <rect x="16" y="200" width="328" height="200" rx="12" fill="#dcc8a8" stroke="#b8a080"/>
    <text x="32" y="228" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1f2937">Step 1: GDPR</text>
    <text x="32" y="252" font-family="system-ui, sans-serif" font-size="14" fill="#374151">Consent to load Stripe/PayPal.</text>
    <rect x="32" y="272" width="296" height="56" rx="6" fill="#f5f0e6" stroke="#b8a080"/>
    <text x="48" y="292" font-family="system-ui, sans-serif" font-size="14" fill="#374151">• External scripts</text>
    <text x="48" y="310" font-family="system-ui, sans-serif" font-size="14" fill="#374151">• No auto-load</text>
