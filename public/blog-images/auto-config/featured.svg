<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ac-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="100%" stop-color="#162032"/>
    </linearGradient>
    <linearGradient id="ac-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="ac-glow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#ac-bg)"/>

  <!-- Pipeline flow: Template → Detect → Configure → Build -->
  <g transform="translate(0, 120)">
    <!-- Connection lines -->
    <line x1="200" y1="55" x2="310" y2="55" stroke="#06b6d4" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>
    <line x1="430" y1="55" x2="520" y2="55" stroke="#06b6d4" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>
    <line x1="640" y1="55" x2="710" y2="55" stroke="#06b6d4" stroke-width="1" opacity="0.2" stroke-dasharray="4,4"/>

    <!-- Arrows -->
    <polygon points="308,50 318,55 308,60" fill="#06b6d4" opacity="0.3"/>
    <polygon points="518,50 528,55 518,60" fill="#06b6d4" opacity="0.3"/>
    <polygon points="708,50 718,55 708,60" fill="#06b6d4" opacity="0.3"/>

    <!-- Step 1: Template (fork icon) -->
    <g transform="translate(100, 10)">
      <rect x="0" y="0" width="100" height="90" rx="8" fill="#06b6d4" opacity="0.06" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.15"/>
      <!-- Fork shape -->
      <g transform="translate(35, 15)" stroke="#06b6d4" stroke-width="2" fill="none" opacity="0.5">
        <line x1="15" y1="0" x2="15" y2="20"/>
        <line x1="0" y1="20" x2="30" y2="20"/>
        <line x1="0" y1="20" x2="0" y2="35"/>
        <line x1="30" y1="20" x2="30" y2="35"/>
        <circle cx="0" cy="38" r="3"/>
        <circle cx="30" cy="38" r="3"/>
      </g>
      <text x="50" y="78" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#06b6d4" opacity="0.6">TEMPLATE</text>
    </g>

    <!-- Step 2: Detect (magnifier) -->
    <g transform="translate(320, 10)">
      <rect x="0" y="0" width="100" height="90" rx="8" fill="#06b6d4" opacity="0.08" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.2"/>
      <g transform="translate(33, 14)" stroke="#06b6d4" stroke-width="2" fill="none" opacity="0.5">
        <circle cx="15" cy="15" r="12"/>
        <line x1="23" y1="23" x2="34" y2="34" stroke-linecap="round"/>
      </g>
      <text x="50" y="78" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#06b6d4" opacity="0.6">DETECT</text>
    </g>

    <!-- Step 3: Configure (gear) -->
    <g transform="translate(530, 10)">
      <rect x="0" y="0" width="100" height="90" rx="8" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="0.5" stroke-opacity="0.25"/>
      <g transform="translate(35, 14)" stroke="#06b6d4" stroke-width="2" fill="none" opacity="0.5">
        <circle cx="15" cy="15" r="8"/>
        <!-- Gear teeth (simplified) -->
        <line x1="15" y1="0" x2="15" y2="5"/>
        <line x1="15" y1="25" x2="15" y2="30"/>
        <line x1="0" y1="15" x2="5" y2="15"/>
        <line x1="25" y1="15" x2="30" y2="15"/>
        <line x1="4" y1="4" x2="8" y2="8"/>
        <line x1="22" y1="22" x2="26" y2="26"/>
        <line x1="26" y1="4" x2="22" y2="8"/>
        <line x1="8" y1="22" x2="4" y2="26"/>
      </g>
      <text x="50" y="78" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#06b6d4" opacity="0.6">CONFIGURE</text>
    </g>

    <!-- Step 4: Build (checkmark) -->
    <g transform="translate(720, 10)">
      <rect x="0" y="0" width="70" height="90" rx="8" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.2"/>
      <g transform="translate(20, 18)" stroke="#22c55e" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 0 15 L 10 25 L 30 5"/>
      </g>
      <text x="35" y="78" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#22c55e" opacity="0.6">BUILD</text>
    </g>
  </g>

  <!-- Title -->
  <text x="400" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" text-anchor="middle" fill="white" letter-spacing="-0.3">
    Zero-Config Auto-Detection
  </text>

  <text x="400" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="14" text-anchor="middle" fill="#94a3b8">
    Template to Production Without Manual Setup
  </text>

  <!-- Bottom accent -->
  <rect x="300" y="360" width="200" height="1" fill="url(#ac-cyan)" opacity="0.2"/>
  <text x="400" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle" fill="#475569" letter-spacing="2">SCRIPTHAMMER</text>
</svg>
