<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ct-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#292524"/>
    </linearGradient>
    <linearGradient id="ct-warm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="ct-glow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#ct-bg)"/>

  <!-- Clock face — abstract -->
  <g transform="translate(400, 160)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.15"/>
    <!-- Tick marks -->
    <g stroke="#f97316" stroke-width="2" opacity="0.2">
      <line x1="0" y1="-75" x2="0" y2="-65"/>
      <line x1="37.5" y1="-65" x2="32.5" y2="-56" transform="rotate(30)"/>
      <line x1="0" y1="-75" x2="0" y2="-65" transform="rotate(60)"/>
      <line x1="0" y1="-75" x2="0" y2="-65" transform="rotate(90)"/>
      <line x1="0" y1="-75" x2="0" y2="-65" transform="rotate(120)"/>
      <line x1="0" y1="-75" x2="0" y2="-65" transform="rotate(150)"/>
      <line x1="0" y1="-75" x2="0" y2="-65" transform="rotate(180)"/>
      <line x1="0" y1="-75" x2="0" y2="-65" transform="rotate(210)"/>
      <line x1="0" y1="-75" x2="0" y2="-65" transform="rotate(240)"/>
      <line x1="0" y1="-75" x2="0" y2="-65" transform="rotate(270)"/>
      <line x1="0" y1="-75" x2="0" y2="-65" transform="rotate(300)"/>
      <line x1="0" y1="-75" x2="0" y2="-65" transform="rotate(330)"/>
    </g>
    <!-- Hour hand -->
    <line x1="0" y1="5" x2="0" y2="-40" stroke="#f97316" stroke-width="3" stroke-linecap="round" opacity="0.5" transform="rotate(-30)"/>
    <!-- Minute hand -->
    <line x1="0" y1="5" x2="0" y2="-55" stroke="#f97316" stroke-width="2" stroke-linecap="round" opacity="0.4" transform="rotate(120)"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="4" fill="#f97316" opacity="0.6"/>
    <!-- Glow -->
    <circle cx="0" cy="0" r="30" fill="#f97316" opacity="0.04" filter="url(#ct-glow)"/>
  </g>

  <!-- Countdown digits -->
  <g font-family="ui-monospace, monospace" text-anchor="middle">
    <g transform="translate(230, 290)">
      <rect x="-30" y="-24" width="60" height="36" rx="6" fill="#f97316" opacity="0.08" stroke="#f97316" stroke-width="0.5" stroke-opacity="0.15"/>
      <text y="4" font-size="24" font-weight="700" fill="#f97316" opacity="0.8">31</text>
      <text y="22" font-size="9" fill="#a8a29e" letter-spacing="1">DAYS</text>
    </g>

    <text x="280" y="270" font-size="16" fill="#57534e">:</text>

    <g transform="translate(330, 290)">
      <rect x="-30" y="-24" width="60" height="36" rx="6" fill="#f97316" opacity="0.08" stroke="#f97316" stroke-width="0.5" stroke-opacity="0.15"/>
      <text y="4" font-size="24" font-weight="700" fill="#f97316" opacity="0.8">12</text>
      <text y="22" font-size="9" fill="#a8a29e" letter-spacing="1">HRS</text>
    </g>

    <text x="380" y="270" font-size="16" fill="#57534e">:</text>

    <g transform="translate(430, 290)">
      <rect x="-30" y="-24" width="60" height="36" rx="6" fill="#f97316" opacity="0.08" stroke="#f97316" stroke-width="0.5" stroke-opacity="0.15"/>
      <text y="4" font-size="24" font-weight="700" fill="#f97316" opacity="0.8">47</text>
      <text y="22" font-size="9" fill="#a8a29e" letter-spacing="1">MIN</text>
    </g>

    <text x="480" y="270" font-size="16" fill="#57534e">:</text>

    <g transform="translate(530, 290)">
      <rect x="-30" y="-24" width="60" height="36" rx="6" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="0.5" stroke-opacity="0.15"/>
      <text y="4" font-size="24" font-weight="700" fill="#ef4444" opacity="0.8">23</text>
      <text y="22" font-size="9" fill="#a8a29e" letter-spacing="1">SEC</text>
    </g>
  </g>

  <!-- Title -->
  <text x="400" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="14" text-anchor="middle" fill="#78716c" letter-spacing="1">
    Countdown Timer Component
  </text>

  <!-- Bottom accent -->
  <rect x="300" y="375" width="200" height="1" fill="url(#ct-warm)" opacity="0.2"/>
</svg>
